<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK VIP HUB</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 COLORS SWAPPED AS REQUESTED BY YOU! P1=Cyan, P2=Pink */
        :root { --p1: #00f3ff; --p2: #ff00ff; }
        body, html { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .theme-p1 { --active: var(--p1); --bg: #000d11; }
        .theme-p2 { --active: var(--p2); --bg: #1a001a; }
        .text-glow { color: var(--active); text-shadow: 0 0 12px var(--active); }
        .card-vip { background: var(--bg); padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid #222; border-top: 5px solid var(--active); box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        .btn-neon { background: var(--active); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 15px var(--active); font-size: 16px; text-transform: uppercase; transition: 0.2s; }
        .btn-neon:active { transform: scale(0.96); opacity: 0.9; }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px; background: #080808; border-bottom: 2px solid #222; gap: 12px; scrollbar-width: none; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; background: #111; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.05); }
        
        .service-card { background: #0a0a0a; margin: 12px 15px; padding: 18px; border-radius: 15px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-body { background: #000; width: 88%; max-width: 400px; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid var(--active); box-shadow: 0 0 30px var(--active); max-height: 85vh; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 15px 0; border-top: 2px solid #222; z-index: 1000; }
        .nav-btn { color: #555; font-size: 12px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; }
        .nav-btn i { font-size: 24px; margin-bottom: 5px; display: block; }
        .nav-active { color: var(--active); text-shadow: 0 0 10px var(--active); transform: translateY(-3px); }
        
        input { width: 92%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--active); box-shadow: 0 0 8px var(--active); }
        
        .social-link { font-size: 45px; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { transform: scale(1.1); }
        .big-badge { text-align: center; margin: 30px 0; color: #00ff00; font-size: 22px; font-weight: 900; text-shadow: 0 0 15px #00ff00; text-transform: uppercase; letter-spacing: 1px; }

        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .warning-box { background: #000; padding: 35px 25px; border-radius: 20px; text-align: center; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,0,0,0.8); }
    </style>
</head>
<body id="bdy">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:''});

            // 🚀 LAG FIX: Background silent sync
            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setOrders(r.data.orders.reverse()); 
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            alert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            localStorage.clear(); location.reload();
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    document.getElementById('bdy').className = `theme-p${panel}`;
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return alert("Please give valid details!");
                    if(!form.email.includes('@')) return alert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ...form })
                    .then(() => {
                        const ud = { email: form.email.toLowerCase(), username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => alert(e.response.data.error || "Please give valid details!"));
                } else {
                    if(!form.username || !form.pass) return alert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username, pass: form.pass })
                    .then((r) => {
                        const ud = { email: r.data.email, username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => alert(e.response.data.error || "Please give valid details!"));
                }
            };

            // 🟢 FAST GOOGLE AUTH
            const googleAuth = () => {
                const em = prompt("Secure Google Access\nEnter your valid Email Address to auto-login:");
                if(em && em.includes("@")) {
                    axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel || 1, email: em })
                    .then((r)=>{
                        const ud = { email: r.data.email, username: r.data.username };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel || 1);
                    }).catch((e)=>alert(e.response.data.error || "Login Failed"));
                } else if(em) {
                    alert("Please enter a valid email address!");
                }
            };

            // 🚀 LAG FIX: Superfast Search
            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            if (!panel) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                    <h1 className="text-glow" style={{fontSize:'38px', marginBottom:'20px'}}>MALIK VIP HUB</h1>
                    
                    <p style={{color:'#888', marginBottom:'30px', fontWeight:'bold', textAlign:'center', padding:'0 20px'}}>These two panels have different services and rates. Try both and choose what fits you best!</p>
                    <button className="btn-neon" style={{width:'300px', background:'#00f3ff', margin:'12px'}} onClick={()=>setPanel(1)}>Login or Signup with Panel 1</button>
                    <button className="btn-neon" style={{width:'300px', background:'#ff00ff', margin:'12px'}} onClick={()=>setPanel(2)}>Login or Signup with Panel 2</button>
                </div>
            );

            if (!user) return (
                <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                    <div className="modal-body">
                        <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'20px'}}>{isSignup ? "VIP SIGNUP" : "VIP LOGIN"}</h2>
                        
                        <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                        {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                        <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                        
                        <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                        
                        {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={googleAuth}>Forgot Password? Login with Email</p>}
                        
                        <p style={{marginTop:'20px', color:'#888', cursor:'pointer', fontWeight:'bold'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already VIP? Login Here" : "New User? Signup Here"}</p>
                        
                        <button className="btn-neon" style={{background:'#fff', color:'#000', marginTop:'20px', fontSize:'14px'}} onClick={googleAuth}>
                            <i className="fab fa-google" style={{color:'#DB4437', marginRight:'8px'}}></i> CONTINUE WITH GOOGLE
                        </button>

                        <p style={{marginTop:'25px', color:'#555', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>
                    </div>
                </div>
            );

            return (
                <div style={{paddingBottom:'100px'}}>
                    
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'35px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'16px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');
                                    setWarnUtr(null);
                                }}>I UNDERSTAND</button>
                            </div>
                        </div>
                    )}

                    <div style={{textAlign:'center', padding:'25px 0', borderBottom:'2px solid var(--active)', background:'#050505'}}>
                        <h1 className="text-glow" style={{margin:0, fontSize:'28px'}}>MALIK PANEL {panel}</h1>
                    </div>
                    
                    {tab === "Home" && (
                        <div className="slide-in">
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <p style={{margin:0, color:'#aaa', fontSize:'16px', fontWeight:'bold'}}>Wallet Balance</p>
                                <h2 className="text-glow" style={{fontSize:'50px', margin:'15px 0'}}>₹{balance.toFixed(2)}</h2>
                                <button className="btn-neon" onClick={()=>setModal("pay")}>+ ADD FUNDS HERE</button>
                            </div>
                            
                            <button className="btn-neon" style={{width:'85%', margin:'10px auto', display:'block', background:'transparent', border:'2px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("history")}>TRANSACTION HISTORY</button>

                            <button className="btn-neon" style={{width:'85%', margin:'20px auto', display:'block', background:'transparent', border:'2px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("guide")}>HOW TO USE?</button>

                            <div className="big-badge">🛡️ SAFE, SECURE & FAST<br/>INSTANT DELIVERY</div>

                            <div style={{display:'flex', justifyContent:'center', gap:'35px', marginTop:'30px'}}>
                                <a href="https://t.me/aryan_7611" className="social-link" style={{color:'#00f3ff'}}><i className="fab fa-telegram"></i></a>
                                <a href="https://t.me/smm_providerxmalik" className="social-link" style={{color:'#ff00ff'}}><i className="fa fa-bullhorn"></i></a>
                                <a href="https://youtube.com/@aryanmalik-0786" className="social-link" style={{color:'#ff003c'}}><i className="fab fa-youtube"></i></a>
                            </div>
                            
                            <div style={{textAlign:'center', marginTop:'40px', color:'#555', fontSize:'14px', fontWeight:'bold'}}>DEVELOPED BY ARYAN MALIK</div>
                        </div>
                    )}

                    {tab === "Services" && (
                        <div>
                            <input style={{width:'90%', padding:'15px', margin:'15px auto', display:'block', background:'#0a0a0a', border:'1px solid var(--active)', color:'#fff', borderRadius:'12px', fontSize:'16px'}} placeholder="🔍 Search Cheapest Services..." onChange={e=>setSearch(e.target.value)} />
                            
                            <div className="cat-menu">
                                {cats.map(c => <div key={c} className={`cat-btn ${activeCat===c?'cat-active':''}`} onClick={()=>setActiveCat(c)}>{c}</div>)}
                            </div>
                            
                            {filtered.map(s => (
                                <div className="service-card" key={s.service}>
                                    <div style={{width:'70%'}}><div style={{fontSize:'13px', fontWeight:'bold'}}>{s.name}</div><b className="text-glow" style={{fontSize:'16px'}}>₹{parseFloat(s.rate).toFixed(2)} <span style={{fontSize:'10px', color:'#666'}}>/1k</span></b></div>
                                    <button className="btn-neon" style={{width:'80px', padding:'12px', fontSize:'14px'}} onClick={()=>setModal(s)}>BUY</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === "Orders" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow">📦 Your Orders</h2>
                            {orders.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No orders placed in this panel yet.</p> : 
                                orders.map((o,i)=>(
                                    <div key={i} style={{background:'#0a0a0a', padding:'15px', margin:'10px 0', borderRadius:'12px', borderLeft:'4px solid var(--active)'}}>
                                        <b style={{color:'var(--active)'}}>{o.name}</b><br/>
                                        <div style={{display:'flex', justifyContent:'space-between', marginTop:'8px', fontSize:'12px', color:'#aaa'}}>
                                            <span>Qty: {o.qty}</span>
                                            <span style={{color: o.status.includes('Cancel') ? '#ff003c' : '#00ff00'}}>Status: {o.status}</span>
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {tab === "Profile" && (
                        <div style={{padding:'20px'}}>
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <i className="fa fa-user-circle fa-4x text-glow" style={{marginBottom:'15px'}}></i>
                                <h2>{user.username}</h2>
                                <p style={{color:'#aaa'}}>{user.email}</p>
                            </div>
                            
                            <div className="card-vip" style={{padding:'20px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0'}}><i className="fa fa-shield-alt"></i> Privacy Policy</h3>
                                <p style={{fontSize:'12px', color:'#888', lineHeight:'1.6'}}>Your data is 100% encrypted and secured. We do not share your email or links with any third party. All transactions are safe. We prioritize your privacy above all.</p>
                            </div>

                            <button className="btn-neon" style={{background:'red', marginTop:'20px'}} onClick={()=>{localStorage.clear(); location.reload();}}>LOGOUT ACCOUNT</button>
                        </div>
                    )}

                    {modal === "pay" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">ADD FUNDS</h3>
                                <div style={{background:'#fff', padding:'10px', borderRadius:'15px', display:'inline-block', margin:'15px 0'}}>
                                    <img src="./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png" style={{width:'220px', display:'block'}} onError={(e)=>e.target.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=followersincrease870@oksbi"} />
                                </div>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0'}}>Scan PhonePe QR or Pay via</p>
                                <div className="text-glow" style={{fontWeight:'bold', marginBottom:'20px', fontSize:'15px'}}>GPay UPI: followersincrease870@oksbi</div>
                                
                                <input placeholder="Amount Paid (INR)" type="number" onChange={e=>setForm({...form, amt:e.target.value})} />
                                <input placeholder="12-digit UTR No." onChange={e=>setForm({...form, utr:e.target.value})} />
                                <button className="btn-neon" onClick={()=>axios.post('https://malik-proxy-smm.onrender.com/api/add-funds', {panel, email:user.email, amount:form.amt, utr:form.utr}).then(()=>{alert("Request Sent!");setModal(null);})}>SUBMIT REQUEST</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "guide" && (
                        <div className="modal">
                            <div className="modal-body" style={{textAlign:'left'}}>
                                <h2 className="text-glow" style={{textAlign:'center'}}>How to Use?</h2>
                                <p style={{color:'#bbb', lineHeight:'1.8', fontSize:'14px'}}>
                                    1. <b>Add Funds:</b> Click the Add Funds button, scan the QR code or use the UPI ID to pay.<br/>
                                    2. <b>Submit UTR:</b> Enter the amount and 12-digit UTR number correctly.<br/>
                                    3. <b>Wait:</b> Admin will approve it within 5-10 minutes.<br/>
                                    4. <b>Order:</b> Go to Services, select the cheapest service, paste your link, enter quantity, and click Place Order.<br/>
                                    5. <b>Done:</b> Your order will start instantly!
                                </p>
                                <button className="btn-neon" onClick={()=>setModal(null)} style={{marginTop:'15px'}}>UNDERSTOOD</button>
                            </div>
                        </div>
                    )}

                    {modal === "history" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">TRANSACTION HISTORY</h3>
                                <div style={{maxHeight:'50vh', overflowY:'auto', textAlign:'left'}}>
                                    {txns.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No Transactions Yet.</p> : 
                                        txns.map((t,i)=>(
                                            <div key={i} style={{background:'#0a0a0a', padding:'10px', margin:'10px 0', borderRadius:'8px', borderLeft:'3px solid var(--active)'}}>
                                                <div style={{display:'flex', justifyContent:'space-between'}}>
                                                    <b>₹{t.amount}</b>
                                                    <span style={{color: t.status==='Approved'?'#0f0':'#f00'}}>{t.status}</span>
                                                </div>
                                                <div style={{fontSize:'10px', color:'#555', marginTop:'5px'}}>UTR: {t.utr}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal && typeof modal === 'object' && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4 className="text-glow" style={{marginBottom:'20px'}}>{modal.name}</h4>
                                <input placeholder="Paste Valid Link Here" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity (Min 10)" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <h2 className="text-glow" style={{margin:'20px 0'}}>Total: ₹{((form.qty/1000)*modal.rate).toFixed(2)}</h2>
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.link || form.link.length < 4) { alert("Idhar valid link daalo! ⚠️"); return; }
                                    const c = (form.qty/1000)*modal.rate;
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:c})
                                    .then(r => {
                                        alert("✅ Order Placed Successfully!"); 
                                        setModal(null);
                                    }).catch(e=>alert(e.response.data.error || "Order Failed!"));
                                }}>CONFIRM ORDER</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Profile"?"nav-active":""}`} onClick={()=>setTab("Profile")}><i className="fa fa-user-circle"></i>Profile</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
