<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM | Super App</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 P1 = CYAN, P2 = PINK (Updated) */
        :root { --p1: #00f3ff; --p2: #ff00a0; }
        body, html { background: #030303; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .theme-p1 { --active: var(--p1); --bg: #000d11; }
        .theme-p2 { --active: var(--p2); --bg: #1a0010; }
        .text-glow { color: var(--active); text-shadow: 0 0 15px var(--active); }
        
        .card-vip { background: var(--bg); padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); border-top: 4px solid var(--active); box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        
        .btn-neon { background: var(--active); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 15px rgba(var(--active), 0.5); font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        .btn-neon:hover { transform: translateY(-2px); }
        
        /* Glassmorphism Auth Screen */
        .auth-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0,243,255,0.1), #000); display: flex; justify-content: center; align-items: center; }
        .glass-box { background: rgba(10,10,15,0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px; background: #080808; border-bottom: 2px solid #222; gap: 12px; scrollbar-width: none; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; background: #111; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.05); }
        
        .service-card { background: #0a0a0a; margin: 12px 15px; padding: 18px; border-radius: 15px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-body { background: #050505; width: 88%; max-width: 400px; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid var(--active); max-height: 85vh; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { color: #555; font-size: 12px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; }
        .nav-btn i { font-size: 24px; margin-bottom: 5px; display: block; transition: 0.3s; }
        .nav-active { color: var(--active); text-shadow: 0 0 10px var(--active); transform: translateY(-5px); }
        
        input, select { width: 92%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--active); box-shadow: 0 0 8px var(--active); }
        
        .social-link { font-size: 45px; margin: 0 15px; transition: 0.3s; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--active); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body id="bdy">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [userInfo, setUserInfo] = useState({});
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            const [appConfig, setAppConfig] = useState({qr:'', upi:'', discount:0});
            
            // Settings States
            const [currency, setCurrency] = useState('INR');
            
            const [vipAlert, setVipAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:''});

            useEffect(() => {
                if(user && panel) {
                    document.getElementById('bdy').className = `theme-p${panel}`;
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setOrders(r.data.orders.slice().reverse()); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) setAppConfig(r.data.config);
                        
                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NOTIFICATION:\n\n" + m));
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel && user) {
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel, username: user.username }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel, user]);

            const auth = () => {
                const endpoint = isSignup ? '/signup' : '/login';
                axios.post(`https://malik-proxy-smm.onrender.com/api${endpoint}`, { panel, ...form })
                .then(r => {
                    const ud = { email: isSignup ? form.email : r.data.email, username: form.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                }).catch(e => showAlert(e.response.data.error || "Error during authentication"));
            };

            const filtered = useMemo(() => services.filter(s => (activeCat === "All" || s.category.includes(activeCat)) && s.name.toLowerCase().includes(search.toLowerCase())), [services, activeCat, search]);
            
            const dispRate = (rate) => currency === 'USD' ? `$${(rate/83).toFixed(3)}` : `₹${parseFloat(rate).toFixed(2)}`;

            if (!panel) return (
                <div className="auth-bg">
                    <div className="glass-box">
                        <h1 className="text-glow" style={{fontSize:'35px', margin:'0 0 10px 0'}}>MALIK PROXY</h1>
                        <p style={{color:'#aaa', marginBottom:'30px', fontWeight:'bold'}}>Select your server gateway.</p>
                        <button className="btn-neon" style={{background:'#00f3ff', marginBottom:'15px'}} onClick={()=>setPanel(1)}>SERVER 1 (PREMIUM)</button>
                        <button className="btn-neon" style={{background:'#ff00a0'}} onClick={()=>setPanel(2)}>SERVER 2 (FASTEST)</button>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="auth-bg">
                    <div className="glass-box">
                        <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'10px'}}>ACCESS SECURE AREA</h2>
                        <p style={{color:'#00ff00', fontSize:'12px', marginBottom:'20px'}}>⚠️ Save your password, no recovery available!</p>
                        <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                        {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                        <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                        <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "CREATE ACCOUNT" : "LOGIN SECURELY"}</button>
                        <p style={{marginTop:'20px', color:'#888', cursor:'pointer'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Have an account? Login" : "New? How to Signup & Use (Click)"}</p>
                    </div>
                </div>
            );

            return (
                <div style={{paddingBottom:'100px'}}>
                    {vipAlert && (
                        <div className="modal" style={{zIndex: 99999}}>
                            <div className="modal-body">
                                <h2 className="text-glow">🔔 NOTIFICATION</h2>
                                <p style={{whiteSpace: 'pre-wrap', margin:'20px 0'}}>{vipAlert}</p>
                                <button className="btn-neon" onClick={()=>setVipAlert(null)}>CLOSE</button>
                            </div>
                        </div>
                    )}

                    <div style={{textAlign:'center', padding:'20px 0', borderBottom:'1px solid #222'}}>
                        <h1 className="text-glow" style={{margin:0, fontSize:'24px'}}>MALIK PROXY P{panel}</h1>
                    </div>
                    
                    {tab === "Home" && (
                        <div>
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <p style={{margin:0, color:'#aaa'}}>Available Balance</p>
                                <h2 className="text-glow" style={{fontSize:'45px', margin:'10px 0'}}>{dispRate(balance)}</h2>
                                <button className="btn-neon" onClick={()=>setModal("pay")}>+ ADD FUNDS</button>
                            </div>
                            
                            <button className="btn-neon" style={{width:'85%', margin:'10px auto', display:'block', background:'transparent', border:'2px solid var(--active)'}} onClick={()=>setModal("mailbox")}>📬 SUPPORT MAILBOX</button>
                            <button className="btn-neon" style={{width:'85%', margin:'10px auto', display:'block', background:'transparent', border:'2px solid var(--active)'}} onClick={()=>setModal("history")}>TRANSACTION HISTORY</button>

                            <div style={{textAlign:'center', marginTop:'30px'}}>
                                <p style={{color:'#888', fontWeight:'bold'}}>Join our community for updates!</p>
                                <div style={{display:'flex', justifyContent:'center', gap:'25px', marginTop:'10px'}}>
                                    <a href="https://t.me/zr3v_x" className="social-link" style={{color:'#00f3ff'}}><i className="fa-solid fa-user-astronaut"></i></a>
                                    <a href="https://t.me/all_services_provider" className="social-link" style={{color:'#ff00ff'}}><i className="fa-solid fa-bullhorn"></i></a>
                                    <a href="https://youtube.com/@z3rv_x?si=ayQnR40t-521AFTb" className="social-link" style={{color:'#ff0000'}}><i className="fab fa-youtube"></i></a>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === "Services" && (
                        <div>
                            <input style={{width:'90%', margin:'15px auto', display:'block'}} placeholder="🔍 Search..." onChange={e=>setSearch(e.target.value)} />
                            <div className="cat-menu">
                                {["All", "Instagram", "YouTube", "Telegram"].map(c => <div key={c} className={`cat-btn ${activeCat===c?'cat-active':''}`} onClick={()=>setActiveCat(c)}>{c}</div>)}
                            </div>
                            {filtered.map(s => (
                                <div className="service-card" key={s.service}>
                                    <div style={{width:'70%'}}><div style={{fontSize:'13px', fontWeight:'bold'}}>{s.name}</div><b className="text-glow">{dispRate(s.rate)} <span style={{fontSize:'10px', color:'#666'}}>/1k</span></b></div>
                                    <button className="btn-neon" style={{width:'80px', padding:'10px'}} onClick={()=>setModal(s)}>BUY</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === "Orders" && (
                        <div style={{padding:'20px'}}>
                            <h2 className="text-glow" style={{textAlign:'center'}}>📦 Orders</h2>
                            {orders.map((o,i)=>(
                                <div key={i} style={{background:'#0a0a0a', padding:'15px', margin:'10px 0', borderRadius:'12px', borderLeft:`4px solid ${o.status==='Completed'?'#0f0':'var(--active)'}`}}>
                                    <b>{o.name}</b><br/>
                                    <div style={{display:'flex', justifyContent:'space-between', fontSize:'12px', color:'#aaa', marginTop:'5px'}}>
                                        <span>Qty: {o.qty}</span>
                                        <span style={{color:o.status==='Pending'?'yellow':'#fff'}}>{o.status}</span>
                                    </div>
                                    {o.status === 'Pending' && <button style={{background:'red', color:'#fff', border:'none', padding:'5px 10px', borderRadius:'5px', marginTop:'10px', width:'100%'}} onClick={()=>showAlert("Cancel request sent to Admin!")}>Request Cancel</button>}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ⚙️ NEW SETTINGS TAB */}
                    {tab === "Settings" && (
                        <div style={{padding:'20px'}}>
                            <h2 className="text-glow" style={{textAlign:'center'}}><i className="fa fa-cog"></i> Settings</h2>
                            
                            <div className="card-vip">
                                <h3>Currency</h3>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                    <span>Show prices in USD ($)</span>
                                    <label className="switch">
                                        <input type="checkbox" checked={currency==='USD'} onChange={()=>setCurrency(currency==='USD'?'INR':'USD')} />
                                        <span className="slider"></span>
                                    </label>
                                </div>
                            </div>

                            <div className="card-vip">
                                <h3>Reseller API</h3>
                                <p style={{fontSize:'12px', color:'#888'}}>Connect your panel with ours.</p>
                                <input value={userInfo.api_key || 'Generate in backend'} readOnly style={{background:'#000', color:'var(--active)'}} />
                                <button className="btn-neon" style={{padding:'10px', fontSize:'12px'}} onClick={()=>showAlert("API System Active! Check documentation.")}>VIEW DOCS</button>
                            </div>

                            <div className="card-vip">
                                <h3>Privacy Policy</h3>
                                <p style={{fontSize:'12px', color:'#aaa', lineHeight:'1.5'}}>We respect your data. Your email, API keys, and order links are strictly encrypted. Services are delivered via secure endpoints. No unauthorized sharing.</p>
                            </div>
                            
                            <button className="btn-neon" style={{background:'red', marginTop:'20px'}} onClick={()=>{localStorage.clear(); window.location.reload();}}>LOGOUT</button>
                        </div>
                    )}

                    {modal === "pay" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">ADD FUNDS</h3>
                                {appConfig.qr ? <img src={appConfig.qr} style={{width:'200px', borderRadius:'10px', margin:'10px 0'}}/> : <div style={{padding:'20px', background:'#fff', borderRadius:'10px', display:'inline-block'}}><img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=${appConfig.upi}`} style={{width:'150px'}}/></div>}
                                <p className="text-glow" style={{fontWeight:'bold', margin:'15px 0'}}>{appConfig.upi}</p>
                                <input placeholder="Amount (INR)" type="number" onChange={e=>setForm({...form, amt:e.target.value})} />
                                <input placeholder="UTR Number" onChange={e=>setForm({...form, utr:e.target.value})} />
                                <button className="btn-neon" onClick={()=>axios.post('https://malik-proxy-smm.onrender.com/api/add-funds', {panel, email:user.email, amount:form.amt, utr:form.utr}).then(()=>{showAlert("Payment Sent!");setModal(null);})}>SUBMIT</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Cancel</p>
                            </div>
                        </div>
                    )}
                    
                    {modal === "mailbox" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">📬 MAILBOX</h3>
                                <div style={{maxHeight:'40vh', overflowY:'auto', textAlign:'left', marginBottom:'15px'}}>
                                    {mails.map((m,i)=>(
                                        <div key={i} style={{background: m.from === 'admin' ? '#111' : '#050505', padding:'10px', margin:'10px 0', borderLeft:`3px solid ${m.from === 'admin' ? '#0f0' : 'var(--active)'}`}}>
                                            <b style={{color: m.from === 'admin' ? '#0f0' : 'var(--active)'}}>{m.from === 'admin' ? '👑 ADMIN' : '👤 YOU'}</b>
                                            <p style={{margin:'5px 0', fontSize:'14px'}}>{m.msg}</p>
                                        </div>
                                    ))}
                                </div>
                                <input placeholder="Type message..." value={mailInput} onChange={e=>setMailInput(e.target.value)} />
                                <button className="btn-neon" onClick={()=>{
                                    if(!mailInput) return;
                                    axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:mailInput}).then(()=>{
                                        showAlert("Sent!"); setMails([...mails, {from: 'user', msg: mailInput}]); setMailInput(""); 
                                    })
                                }}>SEND TO ADMIN</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'object' && modal !== null && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4>{modal.name}</h4>
                                <input placeholder="Paste Link" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <h2 className="text-glow">{dispRate((form.qty/1000)*modal.rate)}</h2>
                                <button className="btn-neon" onClick={()=>{
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:(form.qty/1000)*modal.rate}).then(()=>{showAlert("Order Placed!"); setModal(null);})
                                }}>CONFIRM</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Settings"?"nav-active":""}`} onClick={()=>setTab("Settings")}><i className="fa fa-cog"></i>Settings</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
