<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 P1 = CYAN, P2 = PINK (Updated as requested) */
        :root { --p1: #00f3ff; --p2: #ff1493; }
        body, html { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .theme-p1 { --active: var(--p1); --bg: #000d11; }
        .theme-p2 { --active: var(--p2); --bg: #1a000a; }
        .text-glow { color: var(--active); text-shadow: 0 0 12px var(--active); }
        .card-vip { background: var(--bg); padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid #222; border-top: 5px solid var(--active); box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        
        .btn-neon { background: var(--active); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 15px var(--active); font-size: 16px; text-transform: uppercase; transition: 0.2s; }
        .btn-neon:active { transform: scale(0.96); opacity: 0.9; }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px; background: #080808; border-bottom: 2px solid #222; gap: 12px; scrollbar-width: none; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; background: #111; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.05); }
        
        .service-card { background: #0a0a0a; margin: 12px 15px; padding: 18px; border-radius: 15px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; position: relative; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-body { background: #000; width: 88%; max-width: 400px; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid var(--active); box-shadow: 0 0 30px var(--active); max-height: 85vh; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 15px 0; border-top: 2px solid #222; z-index: 1000; }
        .nav-btn { color: #555; font-size: 12px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; }
        .nav-btn i { font-size: 24px; margin-bottom: 5px; display: block; }
        .nav-active { color: var(--active); text-shadow: 0 0 10px var(--active); transform: translateY(-3px); }
        
        input, select { width: 92%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: var(--active); box-shadow: 0 0 8px var(--active); }
        
        .social-link { font-size: 45px; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { transform: scale(1.1); }
        
        /* 🔥 NEW LOGIN BACKGROUND (Professional & Chamkila) */
        .auth-bg { background: linear-gradient(-45deg, #000d11, #1a000a, #000000, #0a0a0a); background-size: 400% 400%; animation: gradientBG 10s ease infinite; height: 100vh; display: flex; justify-content: center; align-items: center; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* 📬 GMAIL STYLE MAILBOX */
        .gmail-box { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; text-align: left; }
        .gmail-header { background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--active); }
        .gmail-msg { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 13px; display: flex; gap: 10px; }
        .gmail-msg.admin { background: rgba(0,255,0,0.05); border-left: 3px solid #0f0; }
        .gmail-msg.user { background: rgba(255,255,255,0.02); border-left: 3px solid var(--active); }

        .notification-toast { position: fixed; top: 20px; right: 20px; background: var(--active); color: #fff; padding: 15px 20px; border-radius: 10px; font-weight: bold; box-shadow: 0 0 20px var(--active); z-index: 999999; animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body id="bdy">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [userInfo, setUserInfo] = useState({});
            
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            
            const [vipAlert, setVipAlert] = useState(null);
            const [toastAlert, setToastAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            const showToast = (msg) => { setToastAlert(msg); setTimeout(()=>setToastAlert(null), 5000); };
            
            const [googleEmail, setGoogleEmail] = useState("");
            const [googleUsername, setGoogleUsername] = useState("");
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:'', f_link:'', v_link:''});

            // 🎛️ DYNAMIC CONFIG & SETTINGS STATE
            const [config, setConfig] = useState({ upi: "followersincrease870@oksbi", qr: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png", wa: "", yt: "https://youtube.com/@z3rv_x?si=ayQnR40t-521AFTb", tg: "@zr3v_x", ch: "https://t.me/all_services_provider" });
            const [currency, setCurrency] = useState("INR");
            const [lang, setLang] = useState("English");

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get('ref')) localStorage.setItem('ref_by', params.get('ref'));
            }, []);

            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setOrders(r.data.orders.slice().reverse()); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) setConfig(r.data.config);
                        
                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NOTIFICATION:\n\n" + m));
                        }
                        if (r.data.notifications && r.data.notifications.length > 0) {
                            r.data.notifications.forEach(n => showToast(`🔔 ${n}`));
                        }
                        
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            showAlert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            setTimeout(() => { localStorage.clear(); setUser(null); setPanel(null); }, 3000);
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    document.getElementById('bdy').className = `theme-p${panel}`;
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return showAlert("Please give valid details!");
                    if(!form.email.includes('@')) return showAlert("Please give valid details!");
                    const ref_code = localStorage.getItem('ref_by') || '';
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ref: ref_code, ...form })
                    .then(() => {
                        const ud = { email: form.email.toLowerCase(), username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Signup Failed!"));
                } else {
                    if(!form.username || !form.pass) return showAlert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username, pass: form.pass })
                    .then((r) => {
                        const ud = { email: r.data.email, username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Login Failed!"));
                }
            };

            const customGoogleAuth = () => { /* Kept unchanged */
                if(!googleEmail.includes("@") || !googleUsername) return showAlert("Please enter both Email and Username!");
                axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel || 1, email: googleEmail, username: googleUsername })
                .then((r)=>{
                    const ud = { email: r.data.email, username: r.data.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel || 1);
                    setShowGoogleModal(false);
                }).catch((e)=>showAlert(e.response.data.error || "Login Failed"));
            };

            const handleLogout = () => { localStorage.removeItem('user'); setUser(null); setTab("Home"); };

            const requestCancel = (orderId) => {
                axios.post('https://malik-proxy-smm.onrender.com/api/cancel-order', { panel, email: user.email, order_id: orderId })
                .then(()=>showAlert("Cancel Request Sent! Admin will verify if service supports cancellation."))
                .catch(e=>showAlert(e.response.data.error || "Error requesting cancel"));
            };

            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            const renderNotification = () => {
                if(!vipAlert) return null;
                return (
                    <div className="modal" style={{zIndex: 999999}}>
                        <div className="modal-body" style={{border: '2px solid var(--active)', boxShadow: '0 0 20px var(--active)'}}>
                            <h2 className="text-glow" style={{margin:'0 0 15px 0'}}>👑 NOTIFICATION</h2>
                            <p style={{fontSize:'16px', margin:'10px 0 25px 0', whiteSpace: 'pre-wrap'}}>{vipAlert}</p>
                            <button className="btn-neon" onClick={()=>setVipAlert(null)}>OK, GOT IT</button>
                        </div>
                    </div>
                );
            };

            if (!panel) return (
                <div className="auth-bg" style={{flexDirection:'column'}}>
                    {renderNotification()}
                    <div style={{background:'rgba(0,0,0,0.8)', padding:'40px', borderRadius:'20px', border:'2px solid var(--p1)', textAlign:'center', boxShadow:'0 0 30px #000'}}>
                        <h1 style={{fontSize:'38px', marginBottom:'10px', color:'var(--p1)', textShadow:'0 0 15px var(--p1)'}}>MALIK PROXY SMM</h1>
                        <p style={{color:'#aaa', marginBottom:'30px', fontWeight:'bold'}}>The Premium Social Media Network</p>
                        <button className="btn-neon" style={{width:'300px', background:'var(--p1)', margin:'12px'}} onClick={()=>setPanel(1)}>Login/Signup - Panel 1 (Premium)</button>
                        <button className="btn-neon" style={{width:'300px', background:'var(--p2)', margin:'12px'}} onClick={()=>setPanel(2)}>Login/Signup - Panel 2 (Raw Cheap)</button>
                        <div style={{marginTop:'25px', fontSize:'12px', color:'#777'}}>Select a panel to enter the dashboard.</div>
                    </div>
                </div>
            );

            if (!user) {
                if(showGoogleModal) return (
                    <div className="auth-bg">
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#fff', color:'#000', border:'none', boxShadow:'0 0 20px rgba(255,255,255,0.2)'}}>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style={{width:'45px', marginBottom:'15px'}} />
                            <h2 style={{margin:'0 0 10px 0', fontSize:'24px'}}>Account Recovery</h2>
                            <p style={{color:'#d93025', fontSize:'13px', fontWeight:'bold', marginBottom:'15px'}}>Security Check: Enter details to verify identity</p>
                            <input placeholder="Enter Registered Email" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px', marginBottom:'10px'}} onChange={e=>setGoogleEmail(e.target.value)} />
                            <input placeholder="Enter Username" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px'}} onChange={e=>setGoogleUsername(e.target.value)} />
                            <button className="btn-neon" style={{background:'#0b57d0', color:'#fff', marginTop:'15px', boxShadow:'none', borderRadius:'4px'}} onClick={customGoogleAuth}>Secure Login</button>
                            <p style={{marginTop:'20px', color:'#0b57d0', cursor:'pointer', fontWeight:'bold', fontSize:'14px'}} onClick={()=>setShowGoogleModal(false)}>Cancel</p>
                        </div>
                    </div>
                );

                return (
                    <div className="auth-bg">
                        {renderNotification()}
                        <div className="modal-body" style={{background:'rgba(0,0,0,0.85)', backdropFilter:'blur(10px)'}}>
                            <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'10px'}}>MALIK PROXY SMM</h2>
                            <h3 style={{color:'#bbb', marginBottom:'20px'}}>{isSignup ? "Create Account" : "Welcome Back"}</h3>
                            <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                            {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                            <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                            {isSignup && <p style={{color:'#ff4444', fontSize:'11px', textAlign:'left', paddingLeft:'15px'}}>⚠️ PLEASE REMEMBER YOUR PASSWORD IN ENGLISH!</p>}
                            <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                            {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setShowGoogleModal(true)}>Forgot Password? Secure Login</p>}
                            <p style={{marginTop:'20px', color:'#888', cursor:'pointer', fontWeight:'bold'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already Registered? Login Here" : "New User? Signup Here"}</p>
                            
                            {/* 🔥 HOW TO USE GUIDE IN AUTH SCREEN */}
                            {isSignup && (
                                <div style={{background:'#111', padding:'15px', borderRadius:'10px', marginTop:'20px', textAlign:'left', fontSize:'12px', color:'#aaa', borderLeft:'2px solid var(--active)'}}>
                                    <b style={{color:'#fff'}}>How to Signup & Use:</b><br/>
                                    1. Enter unique Username & Email.<br/>
                                    2. Create a strong password (REMEMBER IT!).<br/>
                                    3. Login, Go to "Add Funds".<br/>
                                    4. Place orders in "Services" tab. Easy!
                                </div>
                            )}

                            <p style={{marginTop:'25px', color:'#555', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>
                        </div>
                    </div>
                );
            }

            const getRate = (rate) => {
                let finalRate = parseFloat(rate);
                if(userInfo.discount) finalRate = finalRate - (finalRate * (userInfo.discount/100));
                if(currency === "USD") return "$" + (finalRate / 83).toFixed(3);
                return "₹" + finalRate.toFixed(2);
            };

            return (
                <div style={{paddingBottom:'100px'}}>
                    {renderNotification()}
                    {toastAlert && <div className="notification-toast">{toastAlert}</div>}
                    
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'35px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'16px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');
                                    setWarnUtr(null);
                                }}>I UNDERSTAND</button>
                            </div>
                        </div>
                    )}

                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'15px 20px', borderBottom:'2px solid var(--active)', background:'#050505'}}>
                        <h2 className="text-glow" style={{margin:0, fontSize:'22px'}}>MALIK SMM P{panel}</h2>
                        <div style={{display:'flex', gap:'15px'}}>
                            <i className="fa fa-bell" style={{color:'var(--active)', fontSize:'20px', cursor:'pointer'}} onClick={()=>setModal("updates")}></i>
                            <i className="fa fa-cog" style={{color:'#aaa', fontSize:'20px', cursor:'pointer'}} onClick={()=>setModal("settings")}></i>
                        </div>
                    </div>
                    
                    {tab === "Home" && (
                        <div className="slide-in">
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <p style={{margin:0, color:'#aaa', fontSize:'16px', fontWeight:'bold'}}>Wallet Balance</p>
                                <h2 className="text-glow" style={{fontSize:'45px', margin:'10px 0'}}>{currency==="USD"?"$":"₹"}{currency==="USD"?(balance/83).toFixed(2):balance.toFixed(2)}</h2>
                                {userInfo.discount > 0 && <span style={{background:'#0f0', color:'#000', padding:'2px 8px', borderRadius:'5px', fontSize:'12px', fontWeight:'bold'}}>🔥 {userInfo.discount}% VIP DISCOUNT ACTIVE</span>}
                                <button className="btn-neon" style={{marginTop:'15px'}} onClick={()=>setModal("pay")}>+ ADD FUNDS HERE</button>
                            </div>
                            
                            <button className="btn-neon" style={{width:'85%', margin:'10px auto', display:'block', background:'transparent', border:'2px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("history")}>TRANSACTION HISTORY</button>

                            {/* 📬 NEW GMAIL-STYLE MAILBOX BUTTON */}
                            <button className="btn-neon" style={{width:'85%', margin:'20px auto', display:'block', background:'linear-gradient(45deg, #111, var(--bg))', border:'1px solid var(--active)', color:'#fff'}} onClick={()=>setModal("mailbox")}>
                                <i className="fa fa-envelope" style={{color:'var(--active)', marginRight:'10px'}}></i> SUPPORT MAILBOX 
                            </button>

                            <div className="big-badge">🛡️ SAFE, SECURE & FAST</div>

                            {/* DYNAMIC SOCIAL LINKS FROM DB */}
                            <div style={{textAlign:'center', marginTop:'30px'}}>
                                <p style={{color:'#aaa', fontWeight:'bold', fontSize:'12px', letterSpacing:'1px', textTransform:'uppercase'}}>Join our community for updates</p>
                                <div style={{display:'flex', justifyContent:'center', gap:'25px', marginTop:'15px'}}>
                                    <a href={config.tg.startsWith('http') ? config.tg : `https://t.me/${config.tg.replace('@','')}`} className="social-link" style={{color:'#00f3ff'}}><i className="fab fa-telegram"></i></a>
                                    <a href={config.ch} className="social-link" style={{color:'#ff00ff'}}><i className="fa fa-bullhorn"></i></a>
                                    <a href={config.yt} className="social-link" style={{color:'#ff003c'}}><i className="fab fa-youtube"></i></a>
                                </div>
                            </div>
                            
                            {config.wa && (
                                <a href={`https://wa.me/${config.wa}`} style={{display:'block', width:'60%', margin:'30px auto', textAlign:'center', background:'#25D366', color:'#fff', padding:'12px', borderRadius:'25px', textDecoration:'none', fontWeight:'bold'}}>
                                    <i className="fab fa-whatsapp"></i> Chat on WhatsApp
                                </a>
                            )}
                            
                            <div style={{textAlign:'center', marginTop:'40px', color:'#555', fontSize:'14px', fontWeight:'bold'}}>DEVELOPED BY ARYAN MALIK</div>
                        </div>
                    )}

                    {tab === "Services" && (
                        <div>
                            <input style={{width:'90%', padding:'15px', margin:'15px auto', display:'block', background:'#0a0a0a', border:'1px solid var(--active)', color:'#fff', borderRadius:'12px', fontSize:'16px'}} placeholder="🔍 Search Cheapest Services..." onChange={e=>setSearch(e.target.value)} />
                            <div className="cat-menu">
                                {cats.map(c => <div key={c} className={`cat-btn ${activeCat===c?'cat-active':''}`} onClick={()=>setActiveCat(c)}>{c}</div>)}
                            </div>
                            {filtered.map(s => (
                                <div className="service-card" key={s.service}>
                                    <div style={{width:'70%'}}><div style={{fontSize:'13px', fontWeight:'bold'}}>{s.name}</div><b className="text-glow" style={{fontSize:'16px'}}>{getRate(s.rate)} <span style={{fontSize:'10px', color:'#666'}}>/1k</span></b></div>
                                    <button className="btn-neon" style={{width:'80px', padding:'12px', fontSize:'14px'}} onClick={()=>setModal(s)}>BUY</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === "Orders" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow">📦 Your Orders</h2>
                            {orders.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No orders placed in this panel yet.</p> : 
                                orders.map((o,i)=>(
                                    <div key={i} style={{background:'#0a0a0a', padding:'15px', margin:'10px 0', borderRadius:'12px', borderLeft:'4px solid var(--active)'}}>
                                        <b style={{color:'var(--active)'}}>{o.name}</b><br/>
                                        <div style={{display:'flex', justifyContent:'space-between', marginTop:'8px', fontSize:'12px', color:'#aaa'}}>
                                            <span>Qty: {o.qty}</span>
                                            <span style={{color: o.status.includes('Cancel') ? '#ff003c' : (o.status==='Pending'?'#ffa500':'#00ff00')}}>Status: {o.status}</span>
                                        </div>
                                        {/* CANCEL REQUEST OPTION */}
                                        {o.status === "Pending" && (
                                            <button onClick={()=>requestCancel(o.id)} style={{background:'#330000', color:'#ff4444', border:'1px solid #ff4444', borderRadius:'5px', padding:'5px 10px', fontSize:'10px', marginTop:'10px', cursor:'pointer'}}>Cancel Order / Refund Request</button>
                                        )}
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {tab === "Profile" && (
                        <div style={{padding:'20px'}}>
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <i className="fa fa-user-circle fa-4x text-glow" style={{marginBottom:'15px'}}></i>
                                <h2>{user.username}</h2>
                                <p style={{color:'#aaa'}}>{user.email}</p>
                            </div>
                            
                            <div className="card-vip" style={{padding:'20px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0'}}>🎁 Referral Program</h3>
                                <p style={{fontSize:'12px', color:'#888', marginBottom:'15px'}}>Your Link: <b>https://maliksmm.github.io/proxy-smm/?ref={user.username}</b></p>
                                
                                <div style={{display:'flex', justifyContent:'space-between', fontSize:'14px', marginBottom:'15px', fontWeight:'bold'}}>
                                    <span style={{color:'#00f3ff'}}>Signups: {userInfo.ref_signups || 0}</span>
                                    <span style={{color:'#ff00ff'}}>Active Orders: {userInfo.ref_active || 0}</span>
                                </div>
                                
                                {(!userInfo.first_claim && (userInfo.ref_signups >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00'}} onClick={()=>setModal("claim_first")}>CLAIM FIRST REWARD (1k Fol + 100k V)</button>
                                )}
                                {(userInfo.first_claim && (userInfo.ref_active >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00'}} onClick={()=>setModal("claim_lifetime")}>CLAIM LIFETIME REWARD</button>
                                )}
                                {(!userInfo.first_claim && (userInfo.ref_signups < 10)) && (
                                    <p style={{fontSize:'12px', color:'#666', textAlign:'center'}}>Get 10 signups to unlock first reward!</p>
                                )}
                            </div>
                            <button className="btn-neon" style={{background:'red', marginTop:'20px'}} onClick={handleLogout}>LOGOUT ACCOUNT</button>
                        </div>
                    )}

                    {/* ⚙️ SETTINGS MODAL */}
                    {modal === "settings" && (
                        <div className="modal">
                            <div className="modal-body" style={{textAlign:'left'}}>
                                <h3 className="text-glow" style={{textAlign:'center'}}>⚙️ SETTINGS</h3>
                                
                                <p style={{fontSize:'13px', color:'#888', marginBottom:'5px'}}>Language</p>
                                <select onChange={(e)=>setLang(e.target.value)} value={lang}>
                                    <option>English</option><option>Hindi</option><option>Hinglish</option>
                                </select>
                                
                                <p style={{fontSize:'13px', color:'#888', marginBottom:'5px'}}>Currency</p>
                                <select onChange={(e)=>setCurrency(e.target.value)} value={currency}>
                                    <option value="INR">INR (₹)</option><option value="USD">USD ($)</option>
                                </select>

                                <p style={{fontSize:'13px', color:'#888', margin:'15px 0 5px'}}>Your Reseller API Key</p>
                                <input readOnly value={userInfo.api_key || "Generate by messaging admin"} style={{background:'#222', color:'#00f3ff'}} />

                                <div style={{background:'#111', padding:'15px', borderRadius:'10px', marginTop:'20px', fontSize:'11px', color:'#aaa', borderLeft:'2px solid var(--active)'}}>
                                    <b style={{color:'#fff', fontSize:'13px'}}>Privacy Policy</b><br/>
                                    1. Your data is encrypted & safe.<br/>
                                    2. API abuse will result in an IP ban.<br/>
                                    3. We do not sell user data.
                                </div>

                                <button className="btn-neon" onClick={()=>setModal(null)} style={{marginTop:'20px'}}>SAVE & CLOSE</button>
                            </div>
                        </div>
                    )}

                    {/* 🔔 UPDATES MODAL */}
                    {modal === "updates" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">🔔 LIVE UPDATES</h3>
                                <div style={{background:'#111', padding:'15px', borderRadius:'10px', margin:'15px 0', textAlign:'left', borderLeft:'3px solid var(--active)'}}>
                                    <b style={{color:'#fff'}}>🚀 App Version 2.0</b><br/>
                                    <span style={{color:'#aaa', fontSize:'12px'}}>New UI, Gmail-style inbox, Bot control integration, and Ultra-cheap raw services added!</span>
                                </div>
                                <div style={{background:'#111', padding:'15px', borderRadius:'10px', margin:'15px 0', textAlign:'left', borderLeft:'3px solid #ff0000'}}>
                                    <b style={{color:'#fff'}}>⚠️ Advisory</b><br/>
                                    <span style={{color:'#aaa', fontSize:'12px'}}>Do not submit fake UTRs. System is strictly monitored.</span>
                                </div>
                                <button className="btn-neon" onClick={()=>setModal(null)}>CLOSE</button>
                            </div>
                        </div>
                    )}

                    {/* 📬 NEW GMAIL-STYLE MAILBOX MODAL */}
                    {modal === "mailbox" && (
                        <div className="modal">
                            <div className="modal-body" style={{padding:'0', width:'95%', maxWidth:'500px', height:'80vh', display:'flex', flexDirection:'column'}}>
                                <div className="gmail-header">
                                    <h3 style={{margin:0, color:'var(--active)'}}><i className="fa fa-envelope"></i> Mailbox</h3>
                                    <i className="fa fa-times" style={{cursor:'pointer', fontSize:'20px'}} onClick={()=>setModal(null)}></i>
                                </div>
                                
                                <div style={{flex:1, overflowY:'auto', padding:'15px', background:'#0a0a0a'}}>
                                    {mails.length === 0 ? 
                                        <div style={{textAlign:'center', color:'#555', marginTop:'50px'}}>
                                            <i className="fa fa-inbox fa-3x" style={{marginBottom:'15px'}}></i><br/>No Messages Yet.
                                        </div> : 
                                        mails.map((m,i)=>(
                                            <div key={i} className={`gmail-msg ${m.from==='admin'?'admin':'user'}`} style={{marginBottom:'10px', borderRadius:'8px'}}>
                                                <i className={`fa ${m.from==='admin'?'fa-headset':'fa-user'}`} style={{marginTop:'3px', color:m.from==='admin'?'#0f0':'#888'}}></i>
                                                <div>
                                                    <div style={{fontWeight:'bold', color:m.from==='admin'?'#0f0':'#aaa', marginBottom:'4px'}}>{m.from === 'admin' ? 'Support Team' : 'You'}</div>
                                                    <div style={{lineHeight:'1.4'}}>{m.msg}</div>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>

                                <div style={{padding:'15px', background:'#111', borderTop:'1px solid #333'}}>
                                    <div style={{display:'flex', gap:'10px'}}>
                                        <input placeholder="Compose email to admin..." value={mailInput} onChange={e=>setMailInput(e.target.value)} style={{margin:0, flex:1, borderRadius:'20px', padding:'10px 15px', background:'#222', border:'none'}} />
                                        <button onClick={()=>{
                                            if(!mailInput) return showAlert("Please write a message!");
                                            axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:mailInput})
                                            .then(r=>{
                                                setMails([...mails, {from: 'user', msg: mailInput}]);
                                                if(r.data.ai_reply) setMails(prev => [...prev, {from: 'admin', msg: r.data.ai_reply}]);
                                                setMailInput(""); 
                                            })
                                        }} style={{background:'var(--active)', color:'#fff', border:'none', borderRadius:'50%', width:'40px', height:'40px', cursor:'pointer'}}><i className="fa fa-paper-plane"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'string' && modal.includes("claim") && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">CLAIM YOUR GIFT</h3>
                                <input placeholder="Paste Link For Followers" onChange={e=>setForm({...form, f_link:e.target.value})} />
                                <input placeholder="Paste Link For Views" onChange={e=>setForm({...form, v_link:e.target.value})} />
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.f_link || !form.v_link) return showAlert("Please provide both links!");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/claim-reward', {panel, email:user.email, views_link:form.v_link, followers_link:form.f_link})
                                    .then(()=>{showAlert("Reward Claimed! Admin will process it soon.");setModal(null);})
                                }}>SUBMIT LINKS</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close</p>
                            </div>
                        </div>
                    )}

                    {modal === "pay" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">ADD FUNDS</h3>
                                <div style={{background:'#fff', padding:'10px', borderRadius:'15px', display:'inline-block', margin:'15px 0'}}>
                                    <img src={config.qr} style={{width:'220px', display:'block'}} onError={(e)=>e.target.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${config.upi}`} />
                                </div>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0'}}>Scan QR or Pay via</p>
                                <div className="text-glow" style={{fontWeight:'bold', marginBottom:'20px', fontSize:'15px'}}>UPI: {config.upi}</div>
                                <input placeholder="Amount Paid (INR)" type="number" onChange={e=>setForm({...form, amt:e.target.value})} />
                                <input placeholder="12-digit UTR or Transaction ID" onChange={e=>setForm({...form, utr:e.target.value})} />
                                <button className="btn-neon" onClick={()=>axios.post('https://malik-proxy-smm.onrender.com/api/add-funds', {panel, email:user.email, amount:form.amt, utr:form.utr}).then(()=>{showAlert("Payment Request Sent!");setModal(null);})}>SUBMIT REQUEST</button>
                                
                                {/* 🌐 INTERNATIONAL PAYMENT BUTTON */}
                                <button className="btn-neon" style={{background:'transparent', border:'2px solid #00f3ff', color:'#00f3ff', marginTop:'15px', fontSize:'13px'}} onClick={()=>showAlert("For International Payments (PayPal, Crypto, Binance), please open Support Mailbox and message the Admin!")}>🌍 INTERNATIONAL PAYMENT?</button>
                                
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "history" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">TRANSACTION HISTORY</h3>
                                <div style={{maxHeight:'50vh', overflowY:'auto', textAlign:'left'}}>
                                    {txns.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No Transactions Yet.</p> : 
                                        txns.map((t,i)=>(
                                            <div key={i} style={{background:'#0a0a0a', padding:'10px', margin:'10px 0', borderRadius:'8px', borderLeft:'3px solid var(--active)'}}>
                                                <div style={{display:'flex', justifyContent:'space-between'}}>
                                                    <b>₹{t.amount}</b>
                                                    <span style={{color: t.status==='Approved'?'#0f0':'#f00'}}>{t.status}</span>
                                                </div>
                                                <div style={{fontSize:'10px', color:'#555', marginTop:'5px'}}>UTR/TXN: {t.utr}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'object' && modal !== null && !modal.includes && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4 className="text-glow" style={{marginBottom:'20px'}}>{modal.name}</h4>
                                <input placeholder="Paste Valid Link Here" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity (Min 10)" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <h2 className="text-glow" style={{margin:'20px 0'}}>Total: {getRate(((form.qty/1000)*modal.rate))}</h2>
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.link || form.link.length < 4) { showAlert("Valid link is required! ⚠️"); return; }
                                    let c = (form.qty/1000)*modal.rate;
                                    if(userInfo.discount) c = c - (c * (userInfo.discount/100)); // apply discount
                                    
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:c})
                                    .then(r => {
                                        showAlert("Order Placed Successfully! 🚀"); 
                                        setModal(null);
                                    }).catch(e=>showAlert(e.response.data.error || "Order Failed!"));
                                }}>CONFIRM ORDER</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Profile"?"nav-active":""}`} onClick={()=>setTab("Profile")}><i className="fa fa-user-circle"></i>Profile</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
