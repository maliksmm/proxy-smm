<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM - PRO</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 P1 = CYAN, P2 = PINK (Clean & Sharp Look) */
        :root { --p1: #00f3ff; --p2: #ff1493; }
        body, html { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .login-bg { background: #050505; }

        .theme-p1 { --active: var(--p1); --bg: #000d11; }
        .theme-p2 { --active: var(--p2); --bg: #1a000a; }
        
        /* 🌟 Clean Text Glow */
        .text-glow { color: var(--active); text-shadow: 0 0 8px var(--active); }
        .card-vip { background: #0a0a0a; padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid #222; border-top: 4px solid var(--active); box-shadow: 0 4px 15px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        
        /* 🌟 Clean Sharp Button */
        .btn-neon { background: var(--active); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 12px var(--active); font-size: 15px; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px; }
        .btn-neon:active { transform: scale(0.96); box-shadow: 0 0 5px var(--active); }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px 15px; background: #050505; border-bottom: 1px solid #222; gap: 12px; scrollbar-width: none; }
        .cat-menu::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 10px 22px; border-radius: 25px; background: #111; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.03); }
        
        /* 🌟 Clean Service Card Matching Photo 2 */
        .service-card { background: #080808; margin: 15px; padding: 18px; border-radius: 16px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; border-right: 1px solid #111; border-top: 1px solid #111; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-body { background: #080808; width: 90%; max-width: 420px; padding: 25px; border-radius: 24px; text-align: center; border: 1px solid var(--active); box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto; }
        
        /* 🌟 Mailbox Pro Styling */
        .mail-modal { align-items: flex-end; }
        .mail-body { width: 100%; max-width: 600px; height: 88vh; background: #050505; border-radius: 25px 25px 0 0; padding: 20px; display: flex; flexDirection: column; border-top: 2px solid var(--active); }
        .mail-bubble-admin { background: #111; border-left: 3px solid #00ff00; padding: 12px 15px; border-radius: 0 15px 15px 15px; margin-bottom: 15px; text-align: left; align-self: flex-start; max-width: 85%; }
        .mail-bubble-user { background: #1a1a1a; border-right: 3px solid var(--active); padding: 12px 15px; border-radius: 15px 0 15px 15px; margin-bottom: 15px; text-align: left; align-self: flex-end; max-width: 85%; margin-left: auto; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { color: #555; font-size: 11px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; display: block; }
        .nav-active { color: var(--active); text-shadow: 0 0 8px var(--active); transform: translateY(-2px); }
        
        input, select { width: 100%; padding: 16px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--active); background: #111; }
        
        .social-link { font-size: 40px; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { transform: scale(1.1); text-shadow: 0 0 10px currentColor; }
        .big-badge { text-align: center; margin: 25px 0; color: #00ff00; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #00ff00; text-transform: uppercase; letter-spacing: 1px; }

        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .warning-box { background: #000; padding: 35px 25px; border-radius: 20px; text-align: center; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,0,0,0.8); }

        .discount-badge { position:absolute; top:0; right:0; background:#ff003c; padding:6px 20px; border-bottom-left-radius:18px; font-weight:900; font-size:12px; animation: pulse 2s infinite; letter-spacing: 1px; box-shadow: -2px 2px 10px rgba(255,0,60,0.4); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body id="bdy" class="login-bg theme-p1">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [userInfo, setUserInfo] = useState({});
            
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            
            const [appConfig, setAppConfig] = useState({qr_1: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png", qr_2: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png"});
            const [discount, setDiscount] = useState(0);
            const [currency, setCurrency] = useState(localStorage.getItem('currency') || "INR");
            const [language, setLanguage] = useState(localStorage.getItem('language') || "English");
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('user_api_key') || "");

            const [vipAlert, setVipAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            
            const [googleEmail, setGoogleEmail] = useState("");
            const [googleUsername, setGoogleUsername] = useState("");
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:'', f_link:'', v_link:'', oldPass:'', newPass:''});
            const prevOrdersRef = useRef([]);

            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get('ref')) localStorage.setItem('ref_by', params.get('ref'));
                if(user && !localStorage.getItem('user_api_key')){
                    const initKey = 'API_' + btoa(user.email).substring(0,15).toUpperCase() + Math.random().toString(36).substr(2, 5).toUpperCase();
                    localStorage.setItem('user_api_key', initKey);
                    setApiKey(initKey);
                }
            }, [user]);

            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) setAppConfig(r.data.config);
                        setDiscount(r.data.discount || 0);
                        
                        const newOrders = r.data.orders.slice().reverse();
                        if(prevOrdersRef.current.length > 0) {
                            newOrders.forEach(no => {
                                const old = prevOrdersRef.current.find(o => o.id === no.id);
                                if(old && old.status.toLowerCase() !== 'completed' && no.status.toLowerCase() === 'completed') {
                                    if(Notification.permission === "granted") {
                                        new Notification("✅ Order Completed!", {body: `Your order for ${no.name} has been successfully delivered.`});
                                    }
                                }
                            });
                        }
                        prevOrdersRef.current = newOrders;
                        setOrders(newOrders);

                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NEW MAIL FROM ADMIN:\n\n" + m));
                        }
                        
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            showAlert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            setTimeout(() => { localStorage.clear(); setUser(null); setPanel(null); }, 3000);
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    document.getElementById('bdy').className = `login-bg theme-p${panel}`;
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return showAlert("Please give valid details!");
                    if(!form.email.includes('@')) return showAlert("Please give valid details!");
                    const ref_code = localStorage.getItem('ref_by') || '';
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ref: ref_code, ...form })
                    .then(() => {
                        const ud = { email: form.email.toLowerCase(), username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                } else {
                    if(!form.username || !form.pass) return showAlert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username, pass: form.pass })
                    .then((r) => {
                        const ud = { email: r.data.email, username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                }
            };

            const customGoogleAuth = () => {
                if(!googleEmail.includes("@") || !googleUsername) return showAlert("Please enter both Email and Username!");
                axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel || 1, email: googleEmail, username: googleUsername })
                .then((r)=>{
                    const ud = { email: r.data.email, username: r.data.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel || 1);
                    setShowGoogleModal(false);
                }).catch((e)=>showAlert(e.response.data.error || "Login Failed"));
            };

            const handleLogout = () => {
                localStorage.removeItem('user');
                setUser(null); setTab("Home");
            };

            const getRate = (rate) => {
                let finalRate = rate * (1 - discount/100);
                if(currency === "USD") finalRate = finalRate / 83;
                return finalRate.toFixed(3);
            };

            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            const renderNotification = () => {
                if(!vipAlert) return null;
                return (
                    <div className="modal" style={{zIndex: 999999}}>
                        <div className="modal-body" style={{border: '1px solid var(--active)'}}>
                            <h2 className="text-glow" style={{margin:'0 0 15px 0'}}>👑 SYSTEM NOTIFICATION</h2>
                            <p style={{fontSize:'16px', margin:'10px 0 25px 0', whiteSpace: 'pre-wrap'}}>{vipAlert}</p>
                            <button className="btn-neon" onClick={()=>setVipAlert(null)}>OK, GOT IT</button>
                        </div>
                    </div>
                );
            };

            if (!panel) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                    {renderNotification()}
                    <h1 className="text-glow" style={{fontSize:'38px', marginBottom:'20px', textAlign:'center'}}>MALIK PROXY<br/>SMM PRO</h1>
                    <p style={{color:'#888', marginBottom:'30px', fontWeight:'bold', textAlign:'center', padding:'0 20px'}}>These two panels have different services and rates. Try both and choose what fits you best!</p>
                    <button className="btn-neon" style={{width:'300px', background:'#00f3ff', margin:'12px'}} onClick={()=>setPanel(1)}>Login/Signup - Panel 1</button>
                    <button className="btn-neon" style={{width:'300px', background:'#ff1493', margin:'12px'}} onClick={()=>setPanel(2)}>Login/Signup - Panel 2</button>
                </div>
            );

            if (!user) {
                if(showGoogleModal) return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#fff', color:'#000', border:'none', boxShadow:'0 0 20px rgba(255,255,255,0.2)'}}>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style={{width:'45px', marginBottom:'15px'}} />
                            <h2 style={{margin:'0 0 10px 0', fontSize:'24px'}}>Account Recovery</h2>
                            <p style={{color:'#d93025', fontSize:'13px', fontWeight:'bold', marginBottom:'15px'}}>Security Check: Enter details to verify identity</p>
                            <input placeholder="Enter Registered Email" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'100%', padding:'15px', marginBottom:'10px'}} onChange={e=>setGoogleEmail(e.target.value)} />
                            <input placeholder="Enter Username" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'100%', padding:'15px'}} onChange={e=>setGoogleUsername(e.target.value)} />
                            <button className="btn-neon" style={{background:'#0b57d0', color:'#fff', marginTop:'15px', boxShadow:'none', borderRadius:'4px'}} onClick={customGoogleAuth}>Secure Login</button>
                            <p style={{marginTop:'20px', color:'#0b57d0', cursor:'pointer', fontWeight:'bold', fontSize:'14px'}} onClick={()=>setShowGoogleModal(false)}>Cancel</p>
                        </div>
                    </div>
                );

                return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'rgba(5,5,5,0.95)'}}>
                            <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'5px'}}>MALIK PROXY SMM</h2>
                            <h3 style={{color:'#bbb', marginBottom:'20px'}}>{isSignup ? "CREATE ACCOUNT" : "LOGIN"}</h3>
                            
                            {isSignup && <p style={{fontSize:'12px', color:'#00f3ff', marginBottom:'15px'}}>How to signup: Enter a unique username, your email, and a password.</p>}
                            <p style={{color:'#ff1493', fontSize:'14px', fontWeight:'bold', marginBottom:'15px'}}>Please remember your password securely!</p>
                            
                            <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                            {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                            <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                            
                            <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                            {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setShowGoogleModal(true)}>Forgot Password? Secure Login</p>}
                            <p style={{marginTop:'20px', color:'#888', cursor:'pointer', fontWeight:'bold'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already Registered? Login Here" : "New User? Signup Here"}</p>
                            
                            <button className="btn-neon" style={{background:'#fff', color:'#000', marginTop:'20px', fontSize:'14px'}} onClick={()=>setShowGoogleModal(true)}>
                                <i className="fab fa-google" style={{color:'#DB4437', marginRight:'8px'}}></i> SECURE LOGIN RECOVERY
                            </button>
                            <p style={{marginTop:'25px', color:'#555', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>
                        </div>
                    </div>
                );
            }
            return (
                <div style={{paddingBottom:'80px'}}>
                    {renderNotification()}
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'35px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'16px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');
                                    setWarnUtr(null);
                                }}>I UNDERSTAND</button>
                            </div>
                        </div>
                    )}

                    <div style={{textAlign:'center', padding:'20px 0', borderBottom:'1px solid #222', background:'#050505'}}>
                        <h1 className="text-glow" style={{margin:0, fontSize:'24px', letterSpacing:'1px'}}>MALIK PROXY P{panel}</h1>
                    </div>
                    
                    {tab === "Home" && (
                        <div className="slide-in">
                            <div className="card-vip" style={{textAlign:'center'}}>
                                {discount > 0 && <div className="discount-badge">{discount}% OFF ACTIVE</div>}
                                <p style={{margin:0, color:'#aaa', fontSize:'14px', fontWeight:'bold', textTransform:'uppercase'}}>Wallet Balance ({currency})</p>
                                <h2 className="text-glow" style={{fontSize:'45px', margin:'10px 0'}}>{currency === "USD" ? '$' : '₹'}{(currency==="USD"?balance/83:balance).toFixed(2)}</h2>
                                <button className="btn-neon" style={{marginTop:'10px'}} onClick={()=>setModal("pay")}>+ ADD FUNDS HERE</button>
                            </div>
                            
                            <button className="btn-neon" style={{width:'88%', margin:'10px auto', display:'block', background:'transparent', border:'1px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("history")}>TRANSACTION HISTORY</button>
                            <button className="btn-neon" style={{width:'88%', margin:'15px auto', display:'block', background:'transparent', border:'1px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("guide")}>HOW TO USE?</button>

                            <p style={{textAlign:'center', color:'#888', fontSize:'12px', marginTop:'30px', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'1px'}}>Join our community for updates</p>
                            <button className="btn-neon" style={{width:'88%', margin:'0 auto', display:'block', background:'#111', border:'1px solid #333', color:'#fff'}} onClick={()=>setModal("mailbox")}><i className="fa fa-envelope" style={{color:'var(--active)', marginRight:'8px'}}></i> SUPPORT MAILBOX</button>

                            <div className="big-badge">🛡️ SAFE, SECURE & FAST<br/><span style={{fontSize:'14px', color:'#aaa'}}>INSTANT DELIVERY</span></div>

                            <div style={{display:'flex', justifyContent:'center', gap:'40px', marginTop:'20px'}}>
                                <a href="https://t.me/zr3v_x" className="social-link" style={{color:'#00f3ff'}}><i className="fab fa-telegram"></i></a>
                                <a href="https://t.me/all_services_provider" className="social-link" style={{color:'#ff00ff'}}><i className="fa fa-bullhorn"></i></a>
                                <a href="https://youtube.com/@z3rv_x?si=ayQnR40t-521AFTb" className="social-link" style={{color:'#ff003c'}}><i className="fab fa-youtube"></i></a>
                            </div>
                            
                            <div style={{textAlign:'center', marginTop:'40px', color:'#444', fontSize:'12px', fontWeight:'bold', letterSpacing:'1px'}}>DEVELOPED BY ARYAN MALIK</div>
                        </div>
                    )}

                    {tab === "Services" && (
                        <div>
                            {discount > 0 && <div style={{background:'#ff003c', color:'#fff', textAlign:'center', padding:'10px', fontSize:'13px', fontWeight:'bold', letterSpacing:'1px'}}>🔥 {discount}% DISCOUNT APPLIED ON ALL SERVICES 🔥</div>}
                            <input style={{width:'90%', padding:'15px', margin:'15px auto', display:'block', background:'#080808', border:'1px solid #222', color:'#fff', borderRadius:'12px', fontSize:'15px'}} placeholder="🔍 Search Cheapest Services..." onChange={e=>setSearch(e.target.value)} />
                            
                            <div className="cat-menu">
                                {cats.map(c => <div key={c} className={`cat-btn ${activeCat===c?'cat-active':''}`} onClick={()=>setActiveCat(c)}>{c}</div>)}
                            </div>
                            
                            <div style={{paddingBottom:'20px'}}>
                                {filtered.map(s => (
                                    <div className="service-card" key={s.service}>
                                        <div style={{width:'70%', paddingRight:'10px'}}>
                                            <div style={{fontSize:'13px', fontWeight:'bold', lineHeight:'1.4', color:'#eee'}}>{s.name}</div>
                                            <div style={{marginTop:'6px'}}>
                                                {discount > 0 && <span style={{textDecoration:'line-through', color:'#666', fontSize:'12px', marginRight:'6px'}}>{currency==='USD'?'$':'₹'}{currency==='USD'?(s.rate/83).toFixed(3):s.rate.toFixed(2)}</span>}
                                                <b className="text-glow" style={{fontSize:'18px'}}>
                                                    {currency==='USD'?'$':'₹'}{getRate(s.rate)} <span style={{fontSize:'10px', color:'#777'}}>/1k</span>
                                                </b>
                                            </div>
                                        </div>
                                        <button className="btn-neon" style={{width:'80px', padding:'12px', fontSize:'14px', borderRadius:'10px'}} onClick={()=>setModal(s)}>BUY</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === "Orders" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow">📦 Your Orders</h2>
                            {orders.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No orders placed in this panel yet.</p> : 
                                orders.map((o,i)=>(
                                    <div key={i} className="card-vip" style={{padding:'18px', margin:'12px 0', borderTop:'none', borderLeft:'4px solid var(--active)'}}>
                                        <b style={{color:'#fff', fontSize:'14px', lineHeight:'1.4'}}>{o.name}</b><br/>
                                        <div style={{display:'flex', justifyContent:'space-between', marginTop:'12px', fontSize:'12px', color:'#aaa', alignItems:'center', borderTop:'1px solid #222', paddingTop:'10px'}}>
                                            <span>Qty: <b>{o.qty}</b></span>
                                            <span style={{color: o.status.toLowerCase().includes('cancel') ? '#ff003c' : (o.status.toLowerCase()==='completed' ? '#00ff00' : 'var(--active)'), fontWeight:'bold', textTransform:'uppercase'}}>{o.status}</span>
                                        </div>
                                        {/* 🛑 CANCEL OPTION FOR PENDING/PROCESSING ORDERS */}
                                        {['pending', 'processing', 'in progress'].includes(o.status.toLowerCase()) && (
                                            <button style={{marginTop:'15px', width:'100%', background:'transparent', color:'#ff003c', border:'1px solid #ff003c', padding:'8px 10px', borderRadius:'8px', fontSize:'12px', cursor:'pointer', fontWeight:'bold', transition:'0.3s'}} onClick={(e) => {
                                                e.target.style.background = '#ff003c'; e.target.style.color = '#fff';
                                                axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:`Urgent: Please cancel my Order ID ${o.id} - ${o.name}`})
                                                .then(()=>showAlert("Cancellation request sent to Admin successfully!"))
                                            }}>REQUEST CANCEL</button>
                                        )}
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {tab === "Profile" && (
                        <div style={{padding:'20px'}}>
                            <div className="card-vip" style={{textAlign:'center', paddingTop:'30px'}}>
                                <i className="fa fa-user-circle fa-4x text-glow" style={{marginBottom:'15px'}}></i>
                                <h2 style={{margin:'0 0 5px 0'}}>{user.username}</h2>
                                <p style={{color:'#aaa', margin:'0'}}>{user.email}</p>
                            </div>
                            
                            <div className="card-vip" style={{padding:'22px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0'}}>🎁 Referral Program</h3>
                                <p style={{fontSize:'12px', color:'#888', marginBottom:'15px', wordBreak:'break-all'}}>Your Link: <b>https://maliksmm.github.io/proxy-smm/?ref={user.username}</b></p>
                                
                                <div style={{display:'flex', justifyContent:'space-between', fontSize:'14px', marginBottom:'20px', fontWeight:'bold', background:'#111', padding:'12px', borderRadius:'10px'}}>
                                    <span style={{color:'#00f3ff'}}><i className="fa fa-users"></i> Signups: {userInfo.ref_signups || 0}</span>
                                    <span style={{color:'#ff1493'}}><i className="fa fa-shopping-cart"></i> Active: {userInfo.ref_active || 0}</span>
                                </div>
                                
                                {(!userInfo.first_claim && (userInfo.ref_signups >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00', color:'#000'}} onClick={()=>setModal("claim_first")}>CLAIM FIRST REWARD (1k Fol + 100k V)</button>
                                )}
                                {(userInfo.first_claim && (userInfo.ref_active >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00', color:'#000'}} onClick={()=>setModal("claim_lifetime")}>CLAIM LIFETIME REWARD</button>
                                )}
                                {(!userInfo.first_claim && (userInfo.ref_signups < 10)) && (
                                    <p style={{fontSize:'12px', color:'#666', textAlign:'center', margin:0}}>Get 10 signups to unlock first reward!</p>
                                )}
                                {(userInfo.first_claim && (userInfo.ref_active < 10)) && (
                                    <p style={{fontSize:'12px', color:'#666', textAlign:'center', margin:0}}>Get 10 active ordering referrals to unlock next reward!</p>
                                )}
                            </div>

                            <button className="btn-neon" style={{background:'transparent', border:'1px solid #ff003c', color:'#ff003c', marginTop:'10px', boxShadow:'none'}} onClick={handleLogout}>LOGOUT ACCOUNT</button>
                        </div>
                    )}

                    {tab === "Settings" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow"><i className="fa fa-cog"></i> SETTINGS</h2>
                            
                            <div className="card-vip">
                                <h4 style={{margin:'0 0 15px 0', color:'#ccc'}}>Change Currency</h4>
                                <select value={currency} onChange={e => {setCurrency(e.target.value); localStorage.setItem('currency', e.target.value); showAlert(`Currency changed to ${e.target.value}`);}}>
                                    <option value="INR">INR (₹)</option>
                                    <option value="USD">USD ($)</option>
                                </select>

                                <h4 style={{margin:'15px 0 15px 0', color:'#ccc'}}>Change Language</h4>
                                <select value={language} onChange={e => {setLanguage(e.target.value); localStorage.setItem('language', e.target.value); showAlert(`Language changed to ${e.target.value}`);}}>
                                    <option value="English">English</option>
                                    <option value="Hindi">Hindi</option>
                                    <option value="Arabic">Arabic</option>
                                </select>
                            </div>

                            {/* 🛑 RESELLER API SECTION */}
                            <div className="card-vip">
                                <h4 style={{margin:'0 0 5px 0', color:'#ccc'}}>Reseller API Access</h4>
                                <p style={{fontSize:'12px', color:'#888', marginBottom:'15px'}}>Connect your panel with our API.</p>
                                <p style={{fontSize:'11px', color:'var(--active)', wordBreak:'break-all', background:'#111', padding:'10px', borderRadius:'8px'}}>URL: https://malik-proxy-smm.onrender.com/api/v2</p>
                                <input readOnly value={apiKey} style={{background:'#111', color:'#fff', fontSize:'12px', fontFamily:'monospace'}} id="api-key-input" />
                                <div style={{display:'flex', gap:'10px', marginTop:'5px'}}>
                                    <button className="btn-neon" style={{padding:'12px', fontSize:'12px', flex:1}} onClick={()=>{
                                        navigator.clipboard.writeText(apiKey);
                                        showAlert("API Key Copied to Clipboard!");
                                    }}>COPY KEY</button>
                                    <button className="btn-neon" style={{padding:'12px', fontSize:'12px', flex:1, background:'transparent', border:'1px solid #ff003c', color:'#ff003c', boxShadow:'none'}} onClick={()=>{
                                        const newKey = 'API_' + Math.random().toString(36).substr(2, 10).toUpperCase() + btoa(user.email).substring(0,5).toUpperCase();
                                        localStorage.setItem('user_api_key', newKey);
                                        setApiKey(newKey);
                                        showAlert("New API Key Generated! Old key is now invalid.");
                                    }}>RESET KEY</button>
                                </div>
                            </div>

                            <div className="card-vip">
                                <h4 style={{margin:'0 0 15px 0', color:'#ccc'}}>Change Password</h4>
                                <input type="password" placeholder="Old Password" onChange={e=>setForm({...form, oldPass:e.target.value})} />
                                <input type="password" placeholder="New Password" onChange={e=>setForm({...form, newPass:e.target.value})} />
                                <button className="btn-neon" style={{padding:'12px', fontSize:'14px'}} onClick={()=>{
                                    if(!form.oldPass || !form.newPass) return showAlert("Fill all password fields");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/change-password', {panel, email:user.email, old:form.oldPass, new:form.newPass})
                                    .then(()=>showAlert("Password Updated Successfully!"))
                                    .catch(e=>showAlert(e.response.data.error || "Failed!"));
                                }}>UPDATE PASSWORD</button>
                            </div>

                            <div className="card-vip" style={{padding:'20px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0', fontSize:'16px'}}><i className="fa fa-shield-alt"></i> Privacy Policy</h3>
                                <p style={{fontSize:'12px', color:'#777', lineHeight:'1.6', margin:0}}>Your data is 100% encrypted and secured. We do not share your email or links with any third party. All transactions are safe. We prioritize your privacy above all.</p>
                            </div>
                        </div>
                    )}

                    {/* 📬 GMAIL STYLE MAILBOX MODAL */}
                    {modal === "mailbox" && (
                        <div className="modal mail-modal">
                            <div className="mail-body">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid #222', paddingBottom:'15px', marginBottom:'15px'}}>
                                    <h3 style={{margin:0, color:'var(--active)', fontSize:'20px'}}><i className="fa fa-envelope" style={{marginRight:'8px'}}></i> Support Inbox</h3>
                                    <i className="fa fa-times" style={{fontSize:'22px', cursor:'pointer', color:'#888', transition:'0.3s'}} onClick={()=>setModal(null)}></i>
                                </div>
                                
                                <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', paddingRight:'5px'}}>
                                    {mails.length === 0 ? 
                                        <div style={{textAlign:'center', color:'#666', marginTop:'50px'}}>
                                            <i className="fa fa-inbox fa-3x" style={{marginBottom:'15px', opacity:0.5}}></i>
                                            <p>No messages yet.<br/>Contact admin for support or discounts!</p>
                                        </div> 
                                    : 
                                        mails.map((m,i)=>(
                                            <div key={i} className={m.from === 'admin' ? 'mail-bubble-admin' : 'mail-bubble-user'}>
                                                <div style={{fontSize:'11px', color: m.from === 'admin' ? '#00ff00' : 'var(--active)', fontWeight:'900', marginBottom:'6px', letterSpacing:'1px'}}>
                                                    {m.from === 'admin' ? '👑 ADMIN' : '👤 YOU'}
                                                </div>
                                                <div style={{fontSize:'14px', color:'#eee', lineHeight:'1.5'}}>{m.msg}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                
                                <div style={{display:'flex', gap:'10px', marginTop:'15px', paddingTop:'15px', borderTop:'1px solid #222'}}>
                                    <input style={{flex:1, margin:0, borderRadius:'25px', padding:'15px 20px', background:'#111', border:'1px solid #333'}} placeholder="Type your message..." value={mailInput} onChange={e=>setMailInput(e.target.value)} />
                                    <button className="btn-neon" style={{width:'52px', height:'52px', borderRadius:'50%', padding:'0', display:'flex', justifyContent:'center', alignItems:'center'}} onClick={()=>{
                                        if(!mailInput) return showAlert("Please write a message!");
                                        axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:mailInput})
                                        .then(()=>{
                                            setMails([...mails, {from: 'user', msg: mailInput}]);
                                            setMailInput(""); 
                                            setTimeout(() => {
                                                const mailContainer = document.querySelector('.mail-body > div:nth-child(2)');
                                                if(mailContainer) mailContainer.scrollTop = mailContainer.scrollHeight;
                                            }, 100);
                                        })
                                    }}><i className="fa fa-paper-plane" style={{fontSize:'18px'}}></i></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'string' && modal.includes("claim") && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">CLAIM YOUR GIFT</h3>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0 0 20px 0'}}>Submit your links for 1k Followers & 100k Views!</p>
                                <input placeholder="Paste Link For Followers" onChange={e=>setForm({...form, f_link:e.target.value})} />
                                <input placeholder="Paste Link For Views" onChange={e=>setForm({...form, v_link:e.target.value})} />
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.f_link || !form.v_link) return showAlert("Please provide both links!");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/claim-reward', {panel, email:user.email, views_link:form.v_link, followers_link:form.f_link})
                                    .then(()=>{showAlert("Reward Claimed! Admin will process it soon.");setModal(null);})
                                }}>SUBMIT LINKS</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "pay" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">ADD FUNDS</h3>
                                <div style={{background:'#fff', padding:'10px', borderRadius:'15px', display:'inline-block', margin:'15px 0'}}>
                                    <img src={panel === 1 ? appConfig.qr_1 : appConfig.qr_2} style={{width:'220px', display:'block'}} onError={(e)=>e.target.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=followersincrease870@oksbi"} />
                                </div>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0'}}>Scan QR or Pay via UPI</p>
                                <div className="text-glow" style={{fontWeight:'bold', marginBottom:'10px', fontSize:'16px', letterSpacing:'1px'}}>followersincrease870@oksbi</div>
                                
                                <p style={{color:'#ff003c', fontSize:'11px', fontWeight:'bold', marginBottom:'20px', padding:'10px', background:'rgba(255,0,60,0.1)', borderRadius:'8px', border:'1px solid #ff003c'}}>For International / Other payment methods, please contact Admin via Support Mailbox.</p>
                                
                                <input placeholder="Amount Paid (INR)" type="number" onChange={e=>setForm({...form, amt:e.target.value})} />
                                <input placeholder="12-digit UTR or Transaction ID" onChange={e=>setForm({...form, utr:e.target.value})} />
                                <button className="btn-neon" onClick={()=>axios.post('https://malik-proxy-smm.onrender.com/api/add-funds', {panel, email:user.email, amount:form.amt, utr:form.utr}).then(()=>{showAlert("Payment Request Sent!");setModal(null);})}>SUBMIT REQUEST</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "guide" && (
                        <div className="modal">
                            <div className="modal-body" style={{textAlign:'left'}}>
                                <h2 className="text-glow" style={{textAlign:'center'}}>How to Use?</h2>
                                <p style={{color:'#bbb', lineHeight:'1.8', fontSize:'14px'}}>
                                    1. <b>Add Funds:</b> Click the Add Funds button, scan the QR code or use the UPI ID to pay.<br/>
                                    2. <b>Submit UTR:</b> Enter the amount and 12-digit UTR number correctly.<br/>
                                    3. <b>Wait:</b> Admin will approve it within 5-10 minutes.<br/>
                                    4. <b>Order:</b> Go to Services, select the cheapest service, paste your link, enter quantity, and click Place Order.<br/>
                                    5. <b>Done:</b> Your order will start instantly!
                                </p>
                                <button className="btn-neon" onClick={()=>setModal(null)} style={{marginTop:'20px'}}>UNDERSTOOD</button>
                            </div>
                        </div>
                    )}

                    {modal === "history" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">TRANSACTION HISTORY</h3>
                                <div style={{maxHeight:'50vh', overflowY:'auto', textAlign:'left'}}>
                                    {txns.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No Transactions Yet.</p> : 
                                        txns.map((t,i)=>(
                                            <div key={i} style={{background:'#0a0a0a', padding:'12px 15px', margin:'10px 0', borderRadius:'12px', borderLeft:'4px solid var(--active)', borderTop:'1px solid #222', borderRight:'1px solid #111', borderBottom:'1px solid #111'}}>
                                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                                    <b style={{fontSize:'16px'}}>{currency==='USD'?'$':'₹'}{(currency==='USD'?t.amount/83:t.amount).toFixed(2)}</b>
                                                    <span style={{color: t.status==='Approved'?'#00ff00':'#ff003c', fontWeight:'bold', fontSize:'12px', textTransform:'uppercase'}}>{t.status}</span>
                                                </div>
                                                <div style={{fontSize:'11px', color:'#777', marginTop:'8px'}}>UTR: <span style={{color:'#aaa'}}>{t.utr}</span></div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'object' && modal !== null && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4 className="text-glow" style={{marginBottom:'20px', lineHeight:'1.4', fontSize:'16px'}}>{modal.name}</h4>
                                <input placeholder="Paste Valid Link Here" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity (Min 10)" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <div style={{background:'#111', padding:'15px', borderRadius:'12px', margin:'20px 0', border:'1px solid #333'}}>
                                    <p style={{margin:'0 0 5px 0', color:'#aaa', fontSize:'12px', textTransform:'uppercase'}}>Total Charge</p>
                                    <h2 className="text-glow" style={{margin:0, fontSize:'28px'}}>{currency==='USD'?'$':'₹'}{((form.qty/1000)*getRate(modal.rate)).toFixed(3)}</h2>
                                </div>
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.link || form.link.length < 4) { showAlert("Please enter a valid link! ⚠️"); return; }
                                    const c = (form.qty/1000)*(modal.rate * (1 - discount/100));
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:c})
                                    .then(r => {
                                        showAlert("Order Placed Successfully! 🚀"); 
                                        setModal(null);
                                    }).catch(e=>showAlert(e.response.data.error || "Order Failed!"));
                                }}>CONFIRM ORDER</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777', fontWeight:'bold'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Profile"?"nav-active":""}`} onClick={()=>setTab("Profile")}><i className="fa fa-user-circle"></i>Profile</div>
                        <div className={`nav-btn ${tab==="Settings"?"nav-active":""}`} onClick={()=>setTab("Settings")}><i className="fa fa-cog"></i>Settings</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
