<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM - PRO</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p1: #00f3ff; --p2: #ff1493; --active: #00f3ff; }
        body, html { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .login-bg { background: #000; }

        .text-glow { color: var(--active); text-shadow: 0 0 5px var(--active); }
        .card-vip { background: #0a0a0a; padding: 25px; border-radius: 16px; margin: 15px; border: 1px solid #1a1a1a; border-top: 4px solid var(--active); position:relative; overflow:hidden; }
        
        .btn-neon { background: var(--active); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 10px var(--active); font-size: 14px; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px; }
        .btn-neon:active { transform: scale(0.96); box-shadow: none; }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px 15px; background: #000; border-bottom: 1px solid #111; gap: 12px; scrollbar-width: none; }
        .cat-menu::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; background: #111; border: 1px solid #222; color: #888; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.05); }
        
        .service-card { background: #080808; margin: 15px; padding: 18px; border-radius: 16px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; border-right: 1px solid #111; border-top: 1px solid #111; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); }
        .modal-body { background: #080808; width: 90%; max-width: 420px; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.9); max-height: 85vh; overflow-y: auto; }
        
        /* 📩 GMAIL PRO MAILBOX STYLES - Dynamic Themes */
        .gmail-modal { width: 100%; height: 100%; display: flex; flex-direction: column; border: none; position: absolute; top: 0; left: 0; }
        .mail-theme-1 { background: #121212; }
        .mail-theme-2 { background: #00111a; }
        .mail-theme-3 { background: #1a0011; }
        
        .gmail-header { background: rgba(0,0,0,0.8); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--active); backdrop-filter: blur(10px); }
        .gmail-header h3 { margin: 0; font-size: 18px; color: #fff; font-weight: bold; letter-spacing: 1px; }
        .mail-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .mail-item { display: flex; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: flex-start; cursor: pointer; transition: 0.3s; }
        .mail-item:hover { background: rgba(255,255,255,0.02); }
        
        .mail-avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; margin-right: 15px; color: #000; flex-shrink: 0; box-shadow: 0 0 10px var(--active); }
        .avatar-admin { background: var(--active); }
        .avatar-user { background: #555; color: #fff; box-shadow: none; }
        
        .mail-content { flex: 1; text-align: left; padding-right: 10px; }
        .mail-sender { font-weight: 900; font-size: 15px; color: var(--active); margin-bottom: 4px; text-shadow: 0 0 5px var(--active); }
        .mail-snippet { font-size: 13px; color: #bbb; line-height: 1.4; word-wrap: break-word; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        
        .gmail-compose-box { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); border-top: 1px solid var(--active); display: flex; padding: 10px 15px; align-items: center; box-sizing: border-box; backdrop-filter: blur(10px); }
        .gmail-input { flex: 1; background: #111; border: 1px solid #333; border-radius: 20px; padding: 12px 15px; color: #fff; margin-right: 10px; margin-bottom: 0; outline: none; }
        .gmail-input:focus { border-color: var(--active); }
        .gmail-send { background: var(--active); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 10px var(--active); }

        .mail-detail-box { position: absolute; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:10000; display:flex; flex-direction:column; }
        .md-header { padding: 15px 20px; background: #000; border-bottom: 1px solid var(--active); display: flex; align-items: center; gap: 15px; }
        .md-body { padding: 20px; flex: 1; overflow-y: auto; text-align: left; }
        .md-sender-info { display: flex; align-items: center; margin-bottom: 25px; }
        .md-text { font-size: 15px; line-height: 1.6; color: #eee; white-space: pre-wrap; }
        .md-link { color: var(--active); text-decoration: underline; font-weight: bold; }
        .md-actions { display: flex; gap: 10px; margin-top: 30px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-btn { color: #555; font-size: 11px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; display: block; }
        .nav-active { color: var(--active); text-shadow: 0 0 10px var(--active); transform: translateY(-2px); }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #222; color: #fff; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--active); background: #111; box-shadow: 0 0 5px var(--active); }
        
        /* 🌟 Glowing Social Links */
        .social-container { display:flex; justify-content:center; gap:35px; margin-top:20px; }
        .social-link { font-size: 40px; transition: 0.3s; color: #555; }
        .glow-tg { color: #00f3ff; text-shadow: 0 0 15px #00f3ff; }
        .glow-yt { color: #ff003c; text-shadow: 0 0 15px #ff003c; }
        .glow-ig { color: #ff1493; text-shadow: 0 0 15px #ff1493; }
        .glow-wp { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
        .social-link:hover { transform: scale(1.2); }

        .big-badge { text-align: center; margin: 25px 0; color: #00ff00; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #00ff00; text-transform: uppercase; letter-spacing: 1px; }

        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .warning-box { background: #000; padding: 35px 25px; border-radius: 20px; text-align: center; border: 2px solid #fff; }

        .discount-badge { position:absolute; top:0; right:0; background:#ff003c; padding:6px 20px; border-bottom-left-radius:15px; font-weight:900; font-size:11px; animation: pulse 2s infinite; letter-spacing: 1px; color: #fff; z-index: 10; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .coupon-box { display: flex; gap: 10px; margin-top: 15px; }
        .coupon-box input { margin: 0; flex: 1; text-transform: uppercase; }
        .coupon-box button { width: auto; padding: 0 20px; }
    </style>
</head>
<body id="bdy" class="login-bg">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const AppUI = () => {
            const [appPanels, setAppPanels] = useState([]); // Dynamic Panels
            const [panel, setPanel] = useState(localStorage.getItem('aryan_panel') || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [userInfo, setUserInfo] = useState({});
            
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            const [activeMail, setActiveMail] = useState(null); // Detailed Mail View
            
            const [appConfig, setAppConfig] = useState({
                socials: {tg: "https://t.me/zr3v_x", yt: "https://youtube.com/@z3rv_x?si=ayQnR40t-521AFTb", ig: "", wp: ""},
                mail_theme: "1"
            });
            const [discount, setDiscount] = useState(0);
            const [currency, setCurrency] = useState(localStorage.getItem('currency') || "INR");
            const [language, setLanguage] = useState(localStorage.getItem('language') || "English");
            const [couponInput, setCouponInput] = useState("");
            const [followStep, setFollowStep] = useState(false); // For Reward Claim
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('user_api_key') || "");

            const [vipAlert, setVipAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            
            const [googleEmail, setGoogleEmail] = useState("");
            const [googleUsername, setGoogleUsername] = useState("");
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:'', f_link:'', v_link:'', oldPass:'', newPass:''});
            const prevOrdersRef = useRef([]);

            // Fetch dynamic panels on mount
            useEffect(() => {
                axios.get('https://malik-proxy-smm.onrender.com/api/init-app').then(r => {
                    setAppPanels(r.data.panels);
                    if(r.data.panels.length === 1 && !panel) {
                        setPanel(r.data.panels[0].id);
                        localStorage.setItem('aryan_panel', r.data.panels[0].id);
                    }
                }).catch(e => console.log("Init Error:", e));
            }, []);

            useEffect(() => {
                if(panel && appPanels.length > 0) {
                    const activeP = appPanels.find(p => p.id === panel);
                    if(activeP) document.documentElement.style.setProperty('--active', activeP.color);
                }
            }, [panel, appPanels]);

            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get('ref')) localStorage.setItem('ref_by', params.get('ref'));
                if(user && !localStorage.getItem('user_api_key')){
                    const initKey = 'API_' + btoa(user.email).substring(0,15).toUpperCase() + Math.random().toString(36).substr(2, 5).toUpperCase();
                    localStorage.setItem('user_api_key', initKey);
                    setApiKey(initKey);
                }
            }, [user]);

            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); 
                        setTxns(r.data.txns); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) {
                            setAppConfig(prev => ({...prev, ...r.data.config}));
                        }
                        setDiscount(r.data.discount || 0);
                        
                        const newOrders = r.data.orders.slice().reverse();
                        if(prevOrdersRef.current.length > 0) {
                            newOrders.forEach(no => {
                                const old = prevOrdersRef.current.find(o => o.id === no.id);
                                if(old && old.status.toLowerCase() !== 'completed' && no.status.toLowerCase() === 'completed') {
                                    if(Notification.permission === "granted") {
                                        new Notification("✅ Order Completed!", {body: `Your order for ${no.name} has been successfully delivered.`});
                                    }
                                }
                            });
                        }
                        prevOrdersRef.current = newOrders;
                        setOrders(newOrders);

                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NEW VIP MAIL FROM ADMIN:\n\n" + m));
                        }
                        
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            showAlert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            setTimeout(() => { localStorage.clear(); setUser(null); setPanel(null); }, 3000);
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: s.rate*2})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return showAlert("Please give valid details!");
                    if(!form.email.includes('@')) return showAlert("Please give valid details!");
                    const ref_code = localStorage.getItem('ref_by') || '';
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ref: ref_code, username: form.username.trim(), email: form.email.trim(), pass: form.pass.trim() })
                    .then(() => {
                        const ud = { email: form.email.trim().toLowerCase(), username: form.username.trim() }; // Keep username original case for display
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                } else {
                    if(!form.username || !form.pass) return showAlert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username.trim(), pass: form.pass.trim() })
                    .then((r) => {
                        const ud = { email: r.data.email, username: r.data.username || form.username.trim() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Invalid Username or Password!"));
                }
            };

            const customGoogleAuth = () => {
                if(!googleEmail.includes("@") || !googleUsername) return showAlert("Please enter both Email and Username!");
                axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel, email: googleEmail.trim(), username: googleUsername.trim() })
                .then((r)=>{
                    const ud = { email: r.data.email, username: r.data.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    setShowGoogleModal(false);
                }).catch((e)=>showAlert(e.response.data.error || "Login Failed"));
            };

            const handleLogout = () => {
                localStorage.removeItem('user');
                setUser(null); setTab("Home");
                if(appPanels.length > 1) {
                    setPanel(null);
                    localStorage.removeItem('aryan_panel');
                }
            };

            const getRate = (rate) => {
                let finalRate = rate * (1 - discount/100);
                if(currency === "USD") finalRate = finalRate / 83;
                return finalRate.toFixed(3);
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                showAlert("Copied to clipboard!");
            };

            const formatMailText = (text) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return text.split(urlRegex).map((part, i) => urlRegex.test(part) ? <a key={i} href={part} target="_blank" className="md-link">{part}</a> : part);
            };

            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            const renderNotification = () => {
                if(!vipAlert) return null;
                return (
                    <div className="modal" style={{zIndex: 999999}}>
                        <div className="modal-body" style={{border: '1px solid var(--active)'}}>
                            <h2 className="text-glow" style={{margin:'0 0 15px 0', fontSize:'18px'}}>SYSTEM NOTIFICATION</h2>
                            <p style={{fontSize:'14px', margin:'10px 0 25px 0', whiteSpace: 'pre-wrap', color:'#eee'}}>{vipAlert}</p>
                            <button className="btn-neon" onClick={()=>setVipAlert(null)}>OK, GOT IT</button>
                        </div>
                    </div>
                );
            };

            if (!panel && appPanels.length > 0) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                    {renderNotification()}
                    <h1 className="text-glow" style={{fontSize:'35px', marginBottom:'20px', textAlign:'center', fontWeight:'900', letterSpacing:'1px'}}>MALIK PROXY<br/>SMM PRO</h1>
                    <p style={{color:'#888', marginBottom:'30px', fontWeight:'bold', textAlign:'center', padding:'0 20px', fontSize:'13px'}}>Select an active panel to continue</p>
                    {appPanels.map(p => (
                        <button key={p.id} className="btn-neon" style={{width:'85%', maxWidth:'350px', background: p.color, margin:'10px', color:'#000', boxShadow:`0 0 15px ${p.color}`}} onClick={()=>{setPanel(p.id); localStorage.setItem('aryan_panel', p.id);}}>Login/Signup - {p.name}</button>
                    ))}
                </div>
            );

            if (!user && panel) {
                if(showGoogleModal) return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#fff', color:'#000', border:'none'}}>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style={{width:'40px', marginBottom:'15px'}} />
                            <h2 style={{margin:'0 0 10px 0', fontSize:'20px'}}>Account Recovery</h2>
                            <p style={{color:'#d93025', fontSize:'12px', fontWeight:'bold', marginBottom:'15px'}}>Security Check: Enter details to verify identity</p>
                            <input placeholder="Enter Registered Email" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'100%', padding:'15px', marginBottom:'10px'}} onChange={e=>setGoogleEmail(e.target.value)} />
                            <input placeholder="Enter Username" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'100%', padding:'15px'}} onChange={e=>setGoogleUsername(e.target.value)} />
                            <button className="btn-neon" style={{background:'#0b57d0', color:'#fff', marginTop:'15px', borderRadius:'8px', boxShadow:'none'}} onClick={customGoogleAuth}>Secure Login</button>
                            <p style={{marginTop:'20px', color:'#0b57d0', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setShowGoogleModal(false)}>Cancel</p>
                        </div>
                    </div>
                );

                return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#080808'}}>
                            <h2 className="text-glow" style={{fontSize:'24px', marginBottom:'5px', letterSpacing:'1px'}}>MALIK PROXY SMM</h2>
                            <h3 style={{color:'#888', marginBottom:'20px', fontSize:'14px', textTransform:'uppercase'}}>{isSignup ? "CREATE ACCOUNT" : "LOGIN"}</h3>
                            
                            {isSignup && <p style={{fontSize:'12px', color:'var(--active)', marginBottom:'15px'}}>How to signup: Enter a unique username, your email, and a password.</p>}
                            <p style={{color:'#ff003c', fontSize:'12px', fontWeight:'bold', marginBottom:'15px'}}>Please remember your password securely!</p>
                            
                            <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                            {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                            <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                            
                            <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                            {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'12px'}} onClick={()=>setShowGoogleModal(true)}>Forgot Password? Secure Login</p>}
                            <p style={{marginTop:'20px', color:'#666', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already Registered? Login Here" : "New User? Signup Here"}</p>
                            
                            <button className="btn-neon" style={{background:'#fff', color:'#000', marginTop:'20px', fontSize:'13px', boxShadow:'none'}} onClick={()=>setShowGoogleModal(true)}>
                                <i className="fab fa-google" style={{color:'#DB4437', marginRight:'8px'}}></i> SECURE LOGIN RECOVERY
                            </button>
                            {appPanels.length > 1 && <p style={{marginTop:'25px', color:'#444', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>}
                        </div>
                    </div>
                );
            }

            const actPanelData = appPanels.find(p => p.id === panel) || {name: `P${panel}`};

            return (
                <div style={{paddingBottom:'80px'}}>
                    {renderNotification()}
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'30px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'14px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px', boxShadow:'none'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');

                        <div className="modal">
                            <div className="modal-body" style={{textAlign:'left'}}>
                                <h2 className="text-glow" style={{textAlign:'center', fontSize:'18px'}}>How to Use?</h2>
                                <p style={{color:'#bbb', lineHeight:'1.8', fontSize:'13px'}}>
                                    1. <b>Add Funds:</b> Click the Add Funds button, scan the QR code or use the UPI ID to pay.<br/>
                                    2. <b>Submit UTR:</b> Enter the amount and 12-digit UTR number correctly.<br/>
                                    3. <b>Wait:</b> Admin will approve it within 5-10 minutes.<br/>
                                    4. <b>Order:</b> Go to Services, select the cheapest service, paste your link, enter quantity, and click Place Order.<br/>
                                    5. <b>Done:</b> Your order will start instantly!
                                </p>
                                <button className="btn-neon" onClick={()=>setModal(null)} style={{marginTop:'15px'}}>UNDERSTOOD</button>
                            </div>
                        </div>
                    )}

                    {modal === "history" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow" style={{fontSize:'18px'}}>TRANSACTION HISTORY</h3>
                                <div style={{maxHeight:'50vh', overflowY:'auto', textAlign:'left'}}>
                                    {txns.length === 0 ? <p style={{textAlign:'center', color:'#555', fontSize:'13px'}}>No Transactions Yet.</p> : 
                                        txns.map((t,i)=>(
                                            <div key={i} style={{background:'#080808', padding:'12px 15px', margin:'10px 0', borderRadius:'10px', borderLeft:'4px solid var(--active)', borderTop:'1px solid #1a1a1a', borderRight:'1px solid #111', borderBottom:'1px solid #111'}}>
                                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                                    <b style={{fontSize:'15px', color:'#eee'}}>{currency==='USD'?'$':'₹'}{(currency==='USD'?t.amount/83:t.amount).toFixed(2)}</b>
                                                    <span style={{color: t.status==='Approved'?'#00ff00':'#ff003c', fontWeight:'bold', fontSize:'11px', textTransform:'uppercase'}}>{t.status}</span>
                                                </div>
                                                <div style={{fontSize:'11px', color:'#666', marginTop:'6px'}}>UTR: <span style={{color:'#888'}}>{t.utr}</span></div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#666', fontSize:'13px'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'object' && modal !== null && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4 className="text-glow" style={{marginBottom:'20px', lineHeight:'1.4', fontSize:'15px', color:'#eee'}}>{modal.name}</h4>
                                <input placeholder="Paste Valid Link Here" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity (Min 10)" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <div style={{background:'#050505', padding:'15px', borderRadius:'10px', margin:'20px 0', border:'1px solid #1a1a1a'}}>
                                    <p style={{margin:'0 0 5px 0', color:'#666', fontSize:'11px', textTransform:'uppercase', fontWeight:'bold'}}>Total Charge</p>
                                    <h2 className="text-glow" style={{margin:0, fontSize:'26px'}}>{currency==='USD'?'$':'₹'}{((form.qty/1000)*getRate(modal.rate)).toFixed(3)}</h2>
                                </div>
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.link || form.link.length < 4) { showAlert("Please enter a valid link! ⚠️"); return; }
                                    const c = (form.qty/1000)*(modal.rate * (1 - discount/100));
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:c})
                                    .then(r => {
                                        showAlert("Order Placed Successfully! 🚀"); 
                                        setModal(null);
                                    }).catch(e=>showAlert(e.response.data.error || "Order Failed!"));
                                }}>CONFIRM ORDER</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#666', fontSize:'13px', fontWeight:'bold'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Rewards"?"nav-active":""}`} onClick={()=>setTab("Rewards")}><i className="fa fa-gift"></i>Rewards</div>
                        <div className={`nav-btn ${tab==="Settings"?"nav-active":""}`} onClick={()=>setTab("Settings")}><i className="fa fa-cog"></i>Settings</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
