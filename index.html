<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM - PRO</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 P1 = CYAN, P2 = PINK (Clean & Sharp UI matched to Photo 2) */
        :root { --p1: #00f3ff; --p2: #ff1493; }
        body, html { background: #05080a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Removed Muddy Gradients - Clean Dark Background */
        .login-bg { background: #05080a; position: relative; }
        
        .theme-p1 { --active: var(--p1); --bg: #0a0f12; }
        .theme-p2 { --active: var(--p2); --bg: #12050a; }
        
        /* Sharp Text Glow */
        .text-glow { color: var(--active); text-shadow: 0 0 5px rgba(0, 243, 255, 0.4); }
        .theme-p2 .text-glow { text-shadow: 0 0 5px rgba(255, 20, 147, 0.4); }

        .card-vip { background: var(--bg); padding: 25px; border-radius: 15px; margin: 15px; border: 1px solid #1a2327; border-top: 3px solid var(--active); box-shadow: 0 4px 10px rgba(0,0,0,0.3); position:relative; overflow:hidden; }
        
        /* Crisp Bright Buttons with Black Text (Like Photo 2) */
        .btn-neon { background: var(--active); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 12px var(--active); font-size: 14px; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px; }
        .btn-neon:active { transform: scale(0.96); opacity: 0.9; }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px; background: #05080a; border-bottom: 1px solid #1a2327; gap: 12px; scrollbar-width: none; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; background: transparent; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.03); }
        
        /* Clean Service Card like Photo 2 */
        .service-card { background: #0d1518; margin: 12px 15px; padding: 16px; border-radius: 12px; border: 1px solid #162329; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; box-shadow: none; }
        .theme-p2 .service-card { background: #160a10; border-color: #29101d; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.90); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-body { background: var(--bg); width: 88%; max-width: 400px; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--active); box-shadow: 0 0 20px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #05080a; padding: 12px 0; border-top: 1px solid #1a2327; z-index: 1000; }
        .nav-btn { color: #555; font-size: 11px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s; }
        .nav-btn i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-active { color: var(--active); transform: translateY(-2px); }
        
        input, select { width: 92%; padding: 14px; margin-bottom: 15px; background: #0d1518; border: 1px solid #1a2327; color: #fff; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        .theme-p2 input, .theme-p2 select { background: #160a10; border-color: #29101d; }
        input:focus, select:focus { border-color: var(--active); box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); }
        
        .social-link { font-size: 35px; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { transform: scale(1.1); }
        .big-badge { text-align: center; margin: 30px 0; color: #00ff00; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px rgba(0,255,0,0.3); text-transform: uppercase; letter-spacing: 1px; }

        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .warning-box { background: #000; padding: 35px 25px; border-radius: 20px; text-align: center; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,0,0,0.8); }

        .discount-badge { position:absolute; top:0; right:0; background:#ff003c; color: #fff; padding:5px 15px; border-bottom-left-radius:15px; font-weight:bold; font-size:12px; animation: pulse 2s infinite; z-index: 10; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .ai-chat { background: #05080a; padding:15px; border-radius:10px; min-height: 250px; max-height: 350px; text-align:left; font-size:14px; border:1px solid #1a2327; margin-bottom:15px; overflow-y:auto; line-height: 1.5; }
    </style>
</head>
<body id="bdy" class="login-bg theme-p1">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [userInfo, setUserInfo] = useState({});
            
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            
            const [appConfig, setAppConfig] = useState({qr_1: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png", qr_2: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png"});
            const [discount, setDiscount] = useState(0);
            const [currency, setCurrency] = useState(localStorage.getItem('currency') || "INR");
            const [language, setLanguage] = useState(localStorage.getItem('language') || "English");
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('user_api_key') || "");
            
            const [aiInput, setAiInput] = useState("");
            const [aiChat, setAiChat] = useState([{bot: "Hello! I am Malik AI (Powered by Gemini). I can help you in any language. Need help with the app, services, or want to know about my creator?"}]);

            const [vipAlert, setVipAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            
            const [googleEmail, setGoogleEmail] = useState("");
            const [googleUsername, setGoogleUsername] = useState("");
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:'', f_link:'', v_link:'', oldPass:'', newPass:''});
            const prevOrdersRef = useRef([]);

            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get('ref')) localStorage.setItem('ref_by', params.get('ref'));
                if(user && !localStorage.getItem('user_api_key')){
                    const initKey = 'API_' + btoa(user.email).substring(0,15).toUpperCase() + Math.random().toString(36).substr(2, 5).toUpperCase();
                    localStorage.setItem('user_api_key', initKey);
                    setApiKey(initKey);
                }
            }, [user]);

            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) setAppConfig(r.data.config);
                        setDiscount(r.data.discount || 0);
                        
                        const newOrders = r.data.orders.slice().reverse();
                        if(prevOrdersRef.current.length > 0) {
                            newOrders.forEach(no => {
                                const old = prevOrdersRef.current.find(o => o.id === no.id);
                                if(old && old.status.toLowerCase() !== 'completed' && no.status.toLowerCase() === 'completed') {
                                    if(Notification.permission === "granted") {
                                        new Notification("✅ Order Completed!", {body: `Your order for ${no.name} has been successfully delivered.`});
                                    }
                                }
                            });
                        }
                        prevOrdersRef.current = newOrders;
                        setOrders(newOrders);

                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NEW MAIL FROM ADMIN:\n\n" + m));
                        }
                        
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            showAlert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            setTimeout(() => { localStorage.clear(); setUser(null); setPanel(null); }, 3000);
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    document.getElementById('bdy').className = `login-bg theme-p${panel}`;
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return showAlert("Please give valid details!");
                    if(!form.email.includes('@')) return showAlert("Please give valid details!");
                    const ref_code = localStorage.getItem('ref_by') || '';
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ref: ref_code, ...form })
                    .then(() => {
                        const ud = { email: form.email.toLowerCase(), username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                } else {
                    if(!form.username || !form.pass) return showAlert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username, pass: form.pass })
                    .then((r) => {
                        const ud = { email: r.data.email, username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                }
            };

            const customGoogleAuth = () => {
                if(!googleEmail.includes("@") || !googleUsername) return showAlert("Please enter both Email and Username!");
                axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel || 1, email: googleEmail, username: googleUsername })
                .then((r)=>{
                    const ud = { email: r.data.email, username: r.data.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel || 1);
                    setShowGoogleModal(false);
                }).catch((e)=>showAlert(e.response.data.error || "Login Failed"));
            };

            const handleLogout = () => {
                localStorage.removeItem('user');
                setUser(null); setTab("Home");
            };

            const getRate = (rate) => {
                let finalRate = rate * (1 - discount/100);
                if(currency === "USD") finalRate = finalRate / 83;
                return finalRate.toFixed(3);
            };

            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            // 🧠 FULL GEMINI AI LOGIC (Google Studio Setup)
            const handleAiChat = async () => {
                if(!aiInput) return;
                const userText = aiInput;
                setAiChat(prev => [...prev, {user: userText}]);
                setAiInput("");

                const systemPrompt = `You are a highly intelligent AI assistant integrated into the Malik Proxy SMM panel, acting exactly like Google Gemini. You must answer users in the exact language they use (English, Hindi, Hinglish, etc.).
                
                YOUR KNOWLEDGE BASE:
                1. Creator Info: Your owner/creator is Aryan. He is 16 years old, from Jammu and Kashmir. He is a skilled developer, knows IG banner jacking, and possesses deep cyber knowledge. People hate him, call him bad and 'awara' (wanderer), and he stays away from girls.
                2. App Info: This is Malik Proxy SMM. To add funds: Go to Home, scan QR, pay, and submit 12-digit UTR. Orders take 5-10 minutes. Pending orders can be cancelled from the Orders tab using the 'Request Cancel' button. To contact Admin, use the 'Support Mailbox' on the Home screen. Reseller API keys can be found in the Settings tab.
                
                RULES:
                - Answer ANY general question like a normal Gemini AI.
                - If they ask about the app, guide them using the App Info.
                - If they ask about your owner/creator, tell them the exact Creator Info provided above.`;

                try {
                    // Calling Google Gemini API with the provided key
                    const geminiApiKey = "9ddd128b2174a854bb4c3c97a7769ebe";
                    
                    const response = await axios.post(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${geminiApiKey}`, {
                        contents: [{ parts: [{ text: systemPrompt + "\n\nUser Question: " + userText }] }]
                    });
                    
                    const botReply = response.data.candidates[0].content.parts[0].text;
                    setAiChat(prev => [...prev, {bot: botReply}]);
                } catch (error) {
                    // Fallback to local smart AI if the specific key provided by user fails the Gemini endpoint
                    let fallbackReply = "I am Malik AI. I can answer your queries! (Note: Live API connection error, running on local smart mode). ";
                    let text = userText.toLowerCase();
                    
                    if(text.includes("owner") || text.includes("creator") || text.includes("aryan") || text.includes("who made")) {
                        fallbackReply = "Mera owner Aryan hai. Wo 16 saal ka hai aur Jammu Kashmir se belong karta hai. Wo ek tagda developer hai jiske paas IG banner jacking aur cyber knowledge hai. Log usse nafrat karte hain, awara bulate hain, aur wo ladkiyo se bilkul door rehta hai.";
                    } else if(text.includes("add") || text.includes("fund") || text.includes("money") || text.includes("pay")) {
                        fallbackReply = "Funds add karne ke liye Home screen pe jao, '+ ADD FUNDS' daba kar QR scan karo, aur 12-digit UTR submit kar do.";
                    } else if(text.includes("pending") || text.includes("time") || text.includes("cancel") || text.includes("ruka")) {
                        fallbackReply = "Orders normally 5-10 minutes mein start hote hain. Agar delay ho raha hai, toh Orders tab mein jao aur 'Request Cancel' daba do, admin review karke refund kar dega.";
                    } else if(text.includes("api") || text.includes("key")) {
                        fallbackReply = "Apni Reseller API key aur URL aapko 'Settings' tab mein mil jayegi. Wahan se aap ise copy ya reset kar sakte hain.";
                    } else if(text.includes("admin") || text.includes("contact") || text.includes("help") || text.includes("problem")) {
                        fallbackReply = "Admin se direct baat karne ke liye Home page par '📬 SUPPORT MAILBOX' ka use karein.";
                    } else {
                        fallbackReply += "Main ek advanced AI hoon, par abhi sirf app aur Aryan ke baare mein specifically guide kar raha hoon. Kya madad karu?";
                    }
                    setAiChat(prev => [...prev, {bot: fallbackReply}]);
                }
                
                setTimeout(() => {
                    const chatBox = document.getElementById("ai-chat-box");
                    if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                }, 100);
            };

            const renderNotification = () => {
                if(!vipAlert) return null;
                return (
                    <div className="modal" style={{zIndex: 999999}}>
                        <div className="modal-body">
                            <h2 className="text-glow" style={{margin:'0 0 15px 0'}}>👑 SYSTEM NOTIFICATION</h2>
                            <p style={{fontSize:'15px', margin:'10px 0 25px 0', whiteSpace: 'pre-wrap', lineHeight:'1.5'}}>{vipAlert}</p>
                            <button className="btn-neon" onClick={()=>setVipAlert(null)} style={{color:'#000'}}>OK, GOT IT</button>
                        </div>
                    </div>
                );
            };

            if (!panel) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                    {renderNotification()}
                    <h1 className="text-glow" style={{fontSize:'38px', marginBottom:'20px', textAlign:'center', letterSpacing:'1px'}}>MALIK PROXY<br/>SMM PRO</h1>
                    <p style={{color:'#888', marginBottom:'30px', fontWeight:'bold', textAlign:'center', padding:'0 20px'}}>Select your server panel to continue.</p>
                    <button className="btn-neon" style={{width:'300px', background:'#00f3ff', margin:'12px', color:'#000'}} onClick={()=>setPanel(1)}>Login/Signup - Panel 1</button>
                    <button className="btn-neon" style={{width:'300px', background:'#ff1493', margin:'12px', color:'#000'}} onClick={()=>setPanel(2)}>Login/Signup - Panel 2</button>
                </div>
            );

            if (!user) {
                if(showGoogleModal) return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#fff', color:'#000', border:'none', boxShadow:'0 0 20px rgba(255,255,255,0.2)'}}>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style={{width:'45px', marginBottom:'15px'}} />
                            <h2 style={{margin:'0 0 10px 0', fontSize:'24px'}}>Account Recovery</h2>
                            <p style={{color:'#d93025', fontSize:'13px', fontWeight:'bold', marginBottom:'15px'}}>Security Check: Enter details to verify identity</p>
                            <input placeholder="Enter Registered Email" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px', marginBottom:'10px'}} onChange={e=>setGoogleEmail(e.target.value)} />
                            <input placeholder="Enter Username" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px'}} onChange={e=>setGoogleUsername(e.target.value)} />
                            <button className="btn-neon" style={{background:'#0b57d0', color:'#fff', marginTop:'15px', boxShadow:'none', borderRadius:'4px'}} onClick={customGoogleAuth}>Secure Login</button>
                            <p style={{marginTop:'20px', color:'#0b57d0', cursor:'pointer', fontWeight:'bold', fontSize:'14px'}} onClick={()=>setShowGoogleModal(false)}>Cancel</p>
                        </div>
                    </div>
                );

                return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'rgba(5, 8, 10, 0.95)', border: '1px solid var(--active)'}}>
                            <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'5px'}}>MALIK PROXY SMM</h2>
                            <h3 style={{color:'#bbb', marginBottom:'20px'}}>{isSignup ? "CREATE ACCOUNT" : "LOGIN"}</h3>
                            
                            {isSignup && <p style={{fontSize:'12px', color:'var(--active)', marginBottom:'15px'}}>How to signup: Enter a unique username, your email, and a password.</p>}
                            <p style={{color:'#fff', fontSize:'13px', fontWeight:'bold', marginBottom:'15px', background:'rgba(255,20,147,0.2)', padding:'8px', borderRadius:'5px'}}>Please remember your password securely!</p>
                            
                            <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                            {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                            <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                            
                            <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                            {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setShowGoogleModal(true)}>Forgot Password? Secure Login</p>}
                            <p style={{marginTop:'20px', color:'#888', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already Registered? Login Here" : "New User? Signup Here"}</p>
                            
                            <button className="btn-neon" style={{background:'#fff', color:'#000', marginTop:'20px', fontSize:'14px'}} onClick={()=>setShowGoogleModal(true)}>
                                <i className="fab fa-google" style={{color:'#DB4437', marginRight:'8px'}}></i> SECURE LOGIN RECOVERY
                            </button>
                            <p style={{marginTop:'25px', color:'#555', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>
                        </div>
                    </div>
                );
            }
            return (
                <div style={{paddingBottom:'100px'}}>
                    {renderNotification()}
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'35px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'16px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');
                                    setWarnUtr(null);
                                }}>I UNDERSTAND</button>
                            </div>
                        </div>
                    )}

                    <div style={{textAlign:'center', padding:'20px 0', borderBottom:'1px solid #1a2327', background:'#05080a', display:'flex', justifyContent:'space-around', alignItems:'center'}}>
                        <h1 className="text-glow" style={{margin:0, fontSize:'22px', letterSpacing:'1px'}}>MALIK PROXY P{panel}</h1>
                        <button style={{background:'transparent', border:'none', color:'var(--active)', fontSize:'22px', cursor:'pointer', textShadow:'0 0 10px var(--active)'}} onClick={()=>setModal("ai")}><i className="fa fa-robot"></i></button>
                    </div>
                    
                    {tab === "Home" && (
                        <div className="slide-in">
                            <div className="card-vip" style={{textAlign:'center'}}>
