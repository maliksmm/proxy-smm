<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALIK PROXY SMM - PRO</title>
    <script src="https://unpkg.com/react@16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 P1 = CYAN, P2 = PINK (Updated) */
        :root { --p1: #00f3ff; --p2: #ff1493; }
        body, html { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 🌟 Premium Animated Login Background */
        .login-bg { background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); position: relative; }
        .login-bg::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 50% 0%, var(--active) 0%, transparent 45%); opacity: 0.15; pointer-events:none; }

        .theme-p1 { --active: var(--p1); --bg: #000d11; }
        .theme-p2 { --active: var(--p2); --bg: #1a000a; }
        .text-glow { color: var(--active); text-shadow: 0 0 12px var(--active); }
        .card-vip { background: var(--bg); padding: 25px; border-radius: 20px; margin: 15px; border: 1px solid #222; border-top: 5px solid var(--active); box-shadow: 0 5px 15px rgba(0,0,0,0.8); position:relative; overflow:hidden; }
        
        .btn-neon { background: var(--active); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 0 15px var(--active); font-size: 16px; text-transform: uppercase; transition: 0.2s; }
        .btn-neon:active { transform: scale(0.96); opacity: 0.9; }
        
        .cat-menu { display: flex; overflow-x: auto; padding: 12px; background: #080808; border-bottom: 2px solid #222; gap: 12px; scrollbar-width: none; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; background: #111; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .cat-active { border-color: var(--active); color: var(--active); background: rgba(255,255,255,0.05); }
        
        .service-card { background: #0a0a0a; margin: 12px 15px; padding: 18px; border-radius: 15px; border-left: 4px solid var(--active); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-body { background: #000; width: 88%; max-width: 400px; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid var(--active); box-shadow: 0 0 30px var(--active); max-height: 85vh; overflow-y: auto; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 15px 0; border-top: 2px solid #222; z-index: 1000; }
        .nav-btn { color: #555; font-size: 11px; text-align: center; cursor: pointer; flex: 1; font-weight: bold; }
        .nav-btn i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-active { color: var(--active); text-shadow: 0 0 10px var(--active); transform: translateY(-3px); }
        
        input, select { width: 92%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: var(--active); box-shadow: 0 0 8px var(--active); }
        
        .social-link { font-size: 45px; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { transform: scale(1.1); }
        .big-badge { text-align: center; margin: 30px 0; color: #00ff00; font-size: 22px; font-weight: 900; text-shadow: 0 0 15px #00ff00; text-transform: uppercase; letter-spacing: 1px; }

        .warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .warning-box { background: #000; padding: 35px 25px; border-radius: 20px; text-align: center; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,0,0,0.8); }

        .discount-badge { position:absolute; top:0; right:0; background:#ff003c; padding:5px 15px; border-bottom-left-radius:15px; font-weight:bold; font-size:12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .ai-chat { background: #111; padding:15px; border-radius:10px; min-height: 180px; max-height: 250px; text-align:left; font-size:14px; border:1px solid #333; margin-bottom:15px; overflow-y:auto; line-height: 1.5; }
    </style>
</head>
<body id="bdy" class="login-bg theme-p1">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const AppUI = () => {
            const [panel, setPanel] = useState(parseInt(localStorage.getItem('aryan_panel')) || null);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('user')) || null);
            
            const [tab, setTab] = useState("Home");
            const [balance, setBalance] = useState(0.00);
            const [services, setServices] = useState([]);
            const [activeCat, setActiveCat] = useState("All");
            const [search, setSearch] = useState("");
            const [modal, setModal] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [orders, setOrders] = useState([]);
            const [txns, setTxns] = useState([]);
            const [warnUtr, setWarnUtr] = useState(null); 
            const [showGoogleModal, setShowGoogleModal] = useState(false);
            const [userInfo, setUserInfo] = useState({});
            
            const [mails, setMails] = useState([]);
            const [mailInput, setMailInput] = useState("");
            
            const [appConfig, setAppConfig] = useState({qr_1: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png", qr_2: "./AccountQRCodeJ&K Bank - 6648_DARK_THEME (13).png"});
            const [discount, setDiscount] = useState(0);
            const [currency, setCurrency] = useState(localStorage.getItem('currency') || "INR");
            const [language, setLanguage] = useState(localStorage.getItem('language') || "English");
            
            const [aiInput, setAiInput] = useState("");
            const [aiChat, setAiChat] = useState([{bot: "Hello! I am the Malik Proxy AI Assistant. I can guide you on how to use the app, add funds, or solve order issues. How can I help you today?"}]);

            const [vipAlert, setVipAlert] = useState(null);
            const showAlert = (msg) => setVipAlert(msg);
            
            const [googleEmail, setGoogleEmail] = useState("");
            const [googleUsername, setGoogleUsername] = useState("");
            
            const [form, setForm] = useState({email:'', username:'', pass:'', amt:'', utr:'', link:'', qty:'', f_link:'', v_link:'', oldPass:'', newPass:''});
            const prevOrdersRef = useRef([]);

            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get('ref')) localStorage.setItem('ref_by', params.get('ref'));
            }, []);

            useEffect(() => {
                if(user && panel) {
                    const sync = () => axios.post('https://malik-proxy-smm.onrender.com/api/sync', { email: user.email, panel }).then(r => {
                        setBalance(r.data.balance); setTxns(r.data.txns); 
                        setUserInfo(r.data.user_info || {});
                        setMails(r.data.all_mails || []);
                        if(r.data.config) setAppConfig(r.data.config);
                        setDiscount(r.data.discount || 0);
                        
                        const newOrders = r.data.orders.slice().reverse();
                        if(prevOrdersRef.current.length > 0) {
                            newOrders.forEach(no => {
                                const old = prevOrdersRef.current.find(o => o.id === no.id);
                                if(old && old.status.toLowerCase() !== 'completed' && no.status.toLowerCase() === 'completed') {
                                    if(Notification.permission === "granted") {
                                        new Notification("✅ Order Completed!", {body: `Your order for ${no.name} has been successfully delivered.`});
                                    }
                                }
                            });
                        }
                        prevOrdersRef.current = newOrders;
                        setOrders(newOrders);

                        if (r.data.unread_mails && r.data.unread_mails.length > 0) {
                            r.data.unread_mails.forEach(m => showAlert("📬 NEW MAIL FROM ADMIN:\n\n" + m));
                        }
                        
                        const rej = r.data.txns.find(t => t.status === "Rejected" && !localStorage.getItem(`warn_${t.utr}`));
                        if(rej) setWarnUtr(rej.utr);
                    }).catch(e => {
                        if(e.response && e.response.status === 403) {
                            showAlert("🚫 YOUR ACCOUNT HAS BEEN BLOCKED AND DELETED BY ADMIN!");
                            setTimeout(() => { localStorage.clear(); setUser(null); setPanel(null); }, 3000);
                        }
                    });
                    sync(); const i = setInterval(sync, 4000); return () => clearInterval(i); 
                }
            }, [user, panel]);

            useEffect(() => {
                if(panel) {
                    document.getElementById('bdy').className = `login-bg theme-p${panel}`;
                    axios.post('https://malik-proxy-smm.onrender.com/api/get-services', { panel }).then(r => {
                        setServices(r.data.map(s => ({...s, rate: panel===1?s.rate*2:s.rate*2*83})).sort((a,b)=>a.rate-b.rate));
                    });
                }
            }, [panel]);

            const auth = () => {
                if(isSignup) {
                    if(!form.username || !form.email || !form.pass) return showAlert("Please give valid details!");
                    if(!form.email.includes('@')) return showAlert("Please give valid details!");
                    const ref_code = localStorage.getItem('ref_by') || '';
                    axios.post('https://malik-proxy-smm.onrender.com/api/signup', { panel, ref: ref_code, ...form })
                    .then(() => {
                        const ud = { email: form.email.toLowerCase(), username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                } else {
                    if(!form.username || !form.pass) return showAlert("Please give valid details!");
                    axios.post('https://malik-proxy-smm.onrender.com/api/login', { panel, username: form.username, pass: form.pass })
                    .then((r) => {
                        const ud = { email: r.data.email, username: form.username.toLowerCase() };
                        setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel);
                    }).catch((e) => showAlert(e.response.data.error || "Please give valid details!"));
                }
            };

            const customGoogleAuth = () => {
                if(!googleEmail.includes("@") || !googleUsername) return showAlert("Please enter both Email and Username!");
                axios.post('https://malik-proxy-smm.onrender.com/api/google-auth', { panel: panel || 1, email: googleEmail, username: googleUsername })
                .then((r)=>{
                    const ud = { email: r.data.email, username: r.data.username };
                    setUser(ud); localStorage.setItem('user', JSON.stringify(ud)); localStorage.setItem('aryan_panel', panel || 1);
                    setShowGoogleModal(false);
                }).catch((e)=>showAlert(e.response.data.error || "Login Failed"));
            };

            const handleLogout = () => {
                localStorage.removeItem('user');
                setUser(null); setTab("Home");
            };

            const getRate = (rate) => {
                let finalRate = rate * (1 - discount/100);
                if(currency === "USD") finalRate = finalRate / 83;
                return finalRate.toFixed(3);
            };

            const filtered = useMemo(() => {
                return services.filter(s => {
                    const cMatch = activeCat === "All" || s.category.toLowerCase().includes(activeCat.toLowerCase()) || s.name.toLowerCase().includes(activeCat.toLowerCase());
                    const sMatch = s.name.toLowerCase().includes(search.toLowerCase());
                    return cMatch && sMatch;
                });
            }, [services, activeCat, search]);

            const cats = ["All", "Instagram", "YouTube", "Telegram", "Facebook", "TikTok"];

            // 🧠 SMART AI CHAT LOGIC
            const handleAiChat = () => {
                if(!aiInput) return;
                let text = aiInput.toLowerCase();
                let reply = "I am specifically designed to assist with app functions. To add funds: scan QR, enter UTR. To buy: go to Services. If you face account/order issues, use the Support Mailbox to contact Admin.";
                
                if(text.includes("who created") || text.includes("developer") || text.includes("owner") || text.includes("source code") || text.includes("how was") || text.includes("admin detail")) {
                    reply = "I cannot share developer information or administrative details. My purpose is solely to guide you on how to use Malik Proxy SMM.";
                } else if(text.includes("add") || text.includes("fund") || text.includes("money") || text.includes("recharge") || text.includes("pay")) {
                    reply = "To add funds:\n1. Go to Home > '+ ADD FUNDS HERE'.\n2. Scan the QR code or copy UPI ID.\n3. Make payment.\n4. Enter Amount and 12-digit UTR in the app.\n5. Click Submit. Admin will approve it within 5-10 mins.";
                } else if(text.includes("pending") || text.includes("slow") || text.includes("time") || text.includes("not complete")) {
                    reply = "Orders typically start within 5-10 minutes. However, server loads can sometimes cause delays. If it's taking too long, please use the 'Request Cancel' button in the Orders tab or mail the Admin.";
                } else if(text.includes("cancel") || text.includes("refund") || text.includes("stop")) {
                    reply = "To cancel an order, go to the 'Orders' tab and click 'Request Cancel' below your pending order. The admin will review it and refund the amount to your wallet.";
                } else if(text.includes("discount") || text.includes("cheap") || text.includes("offer")) {
                    reply = "Admin provides random discounts and special holiday offers! Keep an eye on your Mailbox and app dashboard for active discount notifications.";
                } else if(text.includes("password") || text.includes("change")) {
                    reply = "You can securely change your password anytime from the 'Settings' tab.";
                } else if(text.includes("contact") || text.includes("admin") || text.includes("help") || text.includes("problem")) {
                    reply = "For account, payment, or order problems, please click '📬 SUPPORT MAILBOX' on the Home screen to send a direct message to the Admin. They will reply to you shortly.";
                }
                
                setAiChat([...aiChat, {user: aiInput}, {bot: reply}]);
                setAiInput("");
                setTimeout(() => {
                    const chatBox = document.getElementById("ai-chat-box");
                    if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                }, 100);
            };

            const renderNotification = () => {
                if(!vipAlert) return null;
                return (
                    <div className="modal" style={{zIndex: 999999}}>
                        <div className="modal-body" style={{border: '2px solid var(--active)', boxShadow: '0 0 20px var(--active)'}}>
                            <h2 className="text-glow" style={{margin:'0 0 15px 0'}}>👑 SYSTEM NOTIFICATION</h2>
                            <p style={{fontSize:'16px', margin:'10px 0 25px 0', whiteSpace: 'pre-wrap'}}>{vipAlert}</p>
                            <button className="btn-neon" onClick={()=>setVipAlert(null)}>OK, GOT IT</button>
                        </div>
                    </div>
                );
            };

            if (!panel) return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                    {renderNotification()}
                    <h1 className="text-glow" style={{fontSize:'38px', marginBottom:'20px', textAlign:'center'}}>MALIK PROXY<br/>SMM PRO</h1>
                    <p style={{color:'#888', marginBottom:'30px', fontWeight:'bold', textAlign:'center', padding:'0 20px'}}>These two panels have different services and rates. Try both and choose what fits you best!</p>
                    <button className="btn-neon" style={{width:'300px', background:'#00f3ff', margin:'12px', boxShadow:'0 0 20px #00f3ff'}} onClick={()=>setPanel(1)}>Login/Signup - Panel 1</button>
                    <button className="btn-neon" style={{width:'300px', background:'#ff1493', margin:'12px', boxShadow:'0 0 20px #ff1493'}} onClick={()=>setPanel(2)}>Login/Signup - Panel 2</button>
                </div>
            );

            if (!user) {
                if(showGoogleModal) return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'#fff', color:'#000', border:'none', boxShadow:'0 0 20px rgba(255,255,255,0.2)'}}>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style={{width:'45px', marginBottom:'15px'}} />
                            <h2 style={{margin:'0 0 10px 0', fontSize:'24px'}}>Account Recovery</h2>
                            <p style={{color:'#d93025', fontSize:'13px', fontWeight:'bold', marginBottom:'15px'}}>Security Check: Enter details to verify identity</p>
                            <input placeholder="Enter Registered Email" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px', marginBottom:'10px'}} onChange={e=>setGoogleEmail(e.target.value)} />
                            <input placeholder="Enter Username" style={{background:'#f1f3f4', color:'#000', border:'1px solid #ccc', width:'90%', padding:'12px'}} onChange={e=>setGoogleUsername(e.target.value)} />
                            <button className="btn-neon" style={{background:'#0b57d0', color:'#fff', marginTop:'15px', boxShadow:'none', borderRadius:'4px'}} onClick={customGoogleAuth}>Secure Login</button>
                            <p style={{marginTop:'20px', color:'#0b57d0', cursor:'pointer', fontWeight:'bold', fontSize:'14px'}} onClick={()=>setShowGoogleModal(false)}>Cancel</p>
                        </div>
                    </div>
                );

                return (
                    <div style={{height:'100vh', display:'flex', justifyContent:'center', alignItems:'center'}}>
                        {renderNotification()}
                        <div className="modal-body" style={{background:'rgba(0,0,0,0.85)', backdropFilter:'blur(10px)'}}>
                            <h2 className="text-glow" style={{fontSize:'28px', marginBottom:'5px'}}>MALIK PROXY SMM</h2>
                            <h3 style={{color:'#bbb', marginBottom:'20px'}}>{isSignup ? "CREATE ACCOUNT" : "LOGIN"}</h3>
                            
                            {isSignup && <p style={{fontSize:'12px', color:'#00f3ff', marginBottom:'15px'}}>How to signup: Enter a unique username, your email, and a password.</p>}
                            <p style={{color:'#ff1493', fontSize:'14px', fontWeight:'bold', marginBottom:'15px'}}>Please remember your password securely!</p>
                            
                            <input placeholder="Username" onChange={e=>setForm({...form, username:e.target.value})} />
                            {isSignup && <input placeholder="Email Address" onChange={e=>setForm({...form, email:e.target.value})} />}
                            <input type="password" placeholder="Password" onChange={e=>setForm({...form, pass:e.target.value})} />
                            
                            <button className="btn-neon" onClick={auth} style={{marginTop:'10px'}}>{isSignup ? "SIGNUP NOW" : "LOGIN TO PANEL"}</button>
                            {!isSignup && <p style={{marginTop:'15px', color:'var(--active)', cursor:'pointer', fontWeight:'bold', fontSize:'13px'}} onClick={()=>setShowGoogleModal(true)}>Forgot Password? Secure Login</p>}
                            <p style={{marginTop:'20px', color:'#888', cursor:'pointer', fontWeight:'bold'}} onClick={()=>setIsSignup(!isSignup)}>{isSignup ? "Already Registered? Login Here" : "New User? Signup Here"}</p>
                            
                            <button className="btn-neon" style={{background:'#fff', color:'#000', marginTop:'20px', fontSize:'14px'}} onClick={()=>setShowGoogleModal(true)}>
                                <i className="fab fa-google" style={{color:'#DB4437', marginRight:'8px'}}></i> SECURE LOGIN RECOVERY
                            </button>
                            <p style={{marginTop:'25px', color:'#555', cursor:'pointer', fontSize:'12px'}} onClick={()=>setPanel(null)}>← Switch Panel</p>
                        </div>
                    </div>
                );
            }
            return (
                <div style={{paddingBottom:'100px'}}>
                    {renderNotification()}
                    {warnUtr && (
                        <div className="warning-overlay">
                            <div className="warning-box">
                                <h1 style={{color:'#ff0000', fontSize:'35px', margin:'0 0 15px 0'}}><i className="fa fa-exclamation-triangle"></i> WARNING</h1>
                                <p style={{fontSize:'16px', lineHeight:'1.6', color:'#fff', fontWeight:'bold'}}>
                                    If you submit fake payment again, your account and email may be affected. Second time this happens, your account will be blocked and deleted!
                                </p>
                                <button className="btn-neon" style={{background:'#fff', color:'#ff0000', marginTop:'25px'}} onClick={() => {
                                    localStorage.setItem(`warn_${warnUtr}`, 'true');
                                    setWarnUtr(null);
                                }}>I UNDERSTAND</button>
                            </div>
                        </div>
                    )}

                    <div style={{textAlign:'center', padding:'20px 0', borderBottom:'2px solid var(--active)', background:'#050505', display:'flex', justifyContent:'space-around', alignItems:'center'}}>
                        <h1 className="text-glow" style={{margin:0, fontSize:'24px'}}>MALIK PROXY P{panel}</h1>
                        <button style={{background:'transparent', border:'none', color:'var(--active)', fontSize:'20px', cursor:'pointer'}} onClick={()=>setModal("ai")}><i className="fa fa-robot"></i></button>
                    </div>
                    
                    {tab === "Home" && (
                        <div className="slide-in">
                            <div className="card-vip" style={{textAlign:'center'}}>
                                {discount > 0 && <div className="discount-badge">{discount}% OFF ACTIVE</div>}
                                <p style={{margin:0, color:'#aaa', fontSize:'16px', fontWeight:'bold'}}>Wallet Balance ({currency})</p>
                                <h2 className="text-glow" style={{fontSize:'50px', margin:'15px 0'}}>{currency === "USD" ? '$' : '₹'}{(currency==="USD"?balance/83:balance).toFixed(2)}</h2>
                                <button className="btn-neon" onClick={()=>setModal("pay")}>+ ADD FUNDS HERE</button>
                            </div>
                            
                            <button className="btn-neon" style={{width:'85%', margin:'10px auto', display:'block', background:'transparent', border:'2px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("history")}>TRANSACTION HISTORY</button>
                            <button className="btn-neon" style={{width:'85%', margin:'20px auto', display:'block', background:'transparent', border:'2px solid var(--active)', color:'var(--active)'}} onClick={()=>setModal("guide")}>HOW TO USE?</button>

                            <p style={{textAlign:'center', color:'#aaa', fontSize:'13px', marginTop:'25px', marginBottom:'5px'}}>Join our community for updates</p>
                            <button className="btn-neon" style={{width:'85%', margin:'0 auto', display:'block', background:'rgba(255,255,255,0.05)', border:'2px solid var(--active)', color:'#fff'}} onClick={()=>setModal("mailbox")}>📬 SUPPORT MAILBOX</button>

                            <div className="big-badge">🛡️ SAFE, SECURE & FAST<br/>INSTANT DELIVERY</div>

                            <div style={{display:'flex', justifyContent:'center', gap:'35px', marginTop:'30px'}}>
                                <a href="https://t.me/zr3v_x" className="social-link" style={{color:'#00f3ff'}}><i className="fab fa-telegram"></i></a>
                                <a href="https://t.me/all_services_provider" className="social-link" style={{color:'#ff00ff'}}><i className="fa fa-bullhorn"></i></a>
                                <a href="https://youtube.com/@z3rv_x?si=ayQnR40t-521AFTb" className="social-link" style={{color:'#ff003c'}}><i className="fab fa-youtube"></i></a>
                            </div>
                            
                            <div style={{textAlign:'center', marginTop:'40px', color:'#555', fontSize:'14px', fontWeight:'bold'}}>DEVELOPED BY ARYAN MALIK</div>
                        </div>
                    )}

                    {tab === "Services" && (
                        <div>
                            {discount > 0 && <div style={{background:'#ff003c', color:'#fff', textAlign:'center', padding:'8px', fontWeight:'bold'}}>🔥 {discount}% DISCOUNT APPLIED ON ALL SERVICES 🔥</div>}
                            <input style={{width:'90%', padding:'15px', margin:'15px auto', display:'block', background:'#0a0a0a', border:'1px solid var(--active)', color:'#fff', borderRadius:'12px', fontSize:'16px'}} placeholder="🔍 Search Cheapest Services..." onChange={e=>setSearch(e.target.value)} />
                            
                            <div className="cat-menu">
                                {cats.map(c => <div key={c} className={`cat-btn ${activeCat===c?'cat-active':''}`} onClick={()=>setActiveCat(c)}>{c}</div>)}
                            </div>
                            
                            {filtered.map(s => (
                                <div className="service-card" key={s.service}>
                                    <div style={{width:'70%'}}>
                                        <div style={{fontSize:'13px', fontWeight:'bold'}}>{s.name}</div>
                                        {discount > 0 && <span style={{textDecoration:'line-through', color:'#888', fontSize:'12px'}}>{currency==='USD'?'$':'₹'}{currency==='USD'?(s.rate/83).toFixed(3):s.rate.toFixed(2)}</span>}
                                        <b className="text-glow" style={{fontSize:'16px', marginLeft: discount>0?'8px':'0'}}>
                                            {currency==='USD'?'$':'₹'}{getRate(s.rate)} <span style={{fontSize:'10px', color:'#666'}}>/1k</span>
                                        </b>
                                    </div>
                                    <button className="btn-neon" style={{width:'80px', padding:'12px', fontSize:'14px'}} onClick={()=>setModal(s)}>BUY</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === "Orders" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow">📦 Your Orders</h2>
                            {orders.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No orders placed in this panel yet.</p> : 
                                orders.map((o,i)=>(
                                    <div key={i} style={{background:'#0a0a0a', padding:'15px', margin:'10px 0', borderRadius:'12px', borderLeft:'4px solid var(--active)'}}>
                                        <b style={{color:'var(--active)'}}>{o.name}</b><br/>
                                        <div style={{display:'flex', justifyContent:'space-between', marginTop:'8px', fontSize:'12px', color:'#aaa', alignItems:'center'}}>
                                            <span>Qty: {o.qty}</span>
                                            <span style={{color: o.status.includes('Cancel') ? '#ff003c' : '#00ff00'}}>Status: {o.status}</span>
                                        </div>
                                        {o.status.toLowerCase() !== 'completed' && !o.status.toLowerCase().includes('cancel') && (
                                            <button style={{marginTop:'10px', background:'#220000', color:'#ff003c', border:'1px solid #ff003c', padding:'5px 10px', borderRadius:'5px', fontSize:'12px', cursor:'pointer'}} onClick={() => {
                                                axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:`Urgent: Please cancel my Order ID ${o.id}`})
                                                .then(()=>showAlert("Cancellation request sent to Admin!"))
                                            }}>Request Cancel</button>
                                        )}
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {tab === "Profile" && (
                        <div style={{padding:'20px'}}>
                            <div className="card-vip" style={{textAlign:'center'}}>
                                <i className="fa fa-user-circle fa-4x text-glow" style={{marginBottom:'15px'}}></i>
                                <h2>{user.username}</h2>
                                <p style={{color:'#aaa'}}>{user.email}</p>
                            </div>
                            
                            <div className="card-vip" style={{padding:'20px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0'}}>🎁 Referral Program</h3>
                                <p style={{fontSize:'12px', color:'#888', marginBottom:'15px'}}>Your Link: <b>https://maliksmm.github.io/proxy-smm/?ref={user.username}</b></p>
                                
                                <div style={{display:'flex', justifyContent:'space-between', fontSize:'14px', marginBottom:'15px', fontWeight:'bold'}}>
                                    <span style={{color:'#00f3ff'}}>Signups: {userInfo.ref_signups || 0}</span>
                                    <span style={{color:'#ff00ff'}}>Active Orders: {userInfo.ref_active || 0}</span>
                                </div>
                                
                                {(!userInfo.first_claim && (userInfo.ref_signups >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00'}} onClick={()=>setModal("claim_first")}>CLAIM FIRST REWARD (1k Fol + 100k V)</button>
                                )}
                                {(userInfo.first_claim && (userInfo.ref_active >= 10)) && (
                                    <button className="btn-neon" style={{background:'#00ff00'}} onClick={()=>setModal("claim_lifetime")}>CLAIM LIFETIME REWARD</button>
                                )}
                                {(!userInfo.first_claim && (userInfo.ref_signups < 10)) && (
                                    <p style={{fontSize:'12px', color:'#666', textAlign:'center'}}>Get 10 signups to unlock first reward!</p>
                                )}
                                {(userInfo.first_claim && (userInfo.ref_active < 10)) && (
                                    <p style={{fontSize:'12px', color:'#666', textAlign:'center'}}>Get 10 active ordering referrals to unlock next reward!</p>
                                )}
                            </div>

                            <button className="btn-neon" style={{background:'red', marginTop:'20px'}} onClick={handleLogout}>LOGOUT ACCOUNT</button>
                        </div>
                    )}

                    {tab === "Settings" && (
                        <div style={{padding:'20px'}}>
                            <h2 style={{textAlign:'center', marginBottom:'20px'}} className="text-glow"><i className="fa fa-cog"></i> SETTINGS</h2>
                            
                            <div className="card-vip">
                                <h4>Change Currency</h4>
                                <select value={currency} onChange={e => {setCurrency(e.target.value); localStorage.setItem('currency', e.target.value); showAlert(`Currency changed to ${e.target.value}`);}}>
                                    <option value="INR">INR (₹)</option>
                                    <option value="USD">USD ($)</option>
                                </select>

                                <h4>Change Language</h4>
                                <select value={language} onChange={e => {setLanguage(e.target.value); localStorage.setItem('language', e.target.value); showAlert(`Language changed to ${e.target.value}`);}}>
                                    <option value="English">English</option>
                                    <option value="Hindi">Hindi</option>
                                    <option value="Arabic">Arabic</option>
                                </select>
                            </div>

                            <div className="card-vip">
                                <h4>Reseller API Access</h4>
                                <p style={{fontSize:'12px', color:'#aaa'}}>Use this token to connect your panel with us.</p>
                                <input readOnly value={`API_${btoa(user.email).substring(0,20).toUpperCase()}`} style={{background:'#222', color:'var(--active)'}} />
                            </div>

                            <div className="card-vip">
                                <h4>Change Password</h4>
                                <input type="password" placeholder="Old Password" onChange={e=>setForm({...form, oldPass:e.target.value})} />
                                <input type="password" placeholder="New Password" onChange={e=>setForm({...form, newPass:e.target.value})} />
                                <button className="btn-neon" style={{padding:'10px'}} onClick={()=>{
                                    if(!form.oldPass || !form.newPass) return showAlert("Fill all password fields");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/change-password', {panel, email:user.email, old:form.oldPass, new:form.newPass})
                                    .then(()=>showAlert("Password Updated Successfully!"))
                                    .catch(e=>showAlert(e.response.data.error || "Failed!"));
                                }}>UPDATE PASSWORD</button>
                            </div>

                            <div className="card-vip" style={{padding:'20px'}}>
                                <h3 className="text-glow" style={{margin:'0 0 10px 0'}}><i className="fa fa-shield-alt"></i> Privacy Policy</h3>
                                <p style={{fontSize:'12px', color:'#888', lineHeight:'1.6'}}>Your data is 100% encrypted and secured. We do not share your email or links with any third party. All transactions are safe. We prioritize your privacy above all.</p>
                            </div>
                        </div>
                    )}

                    {/* AI Chat Modal */}
                    {modal === "ai" && (
                        <div className="modal">
                            <div className="modal-body" style={{background:'#0a0a0a'}}>
                                <h3 className="text-glow"><i className="fa fa-robot"></i> MALIK AI</h3>
                                <div className="ai-chat" id="ai-chat-box">
                                    {aiChat.map((c,i) => (
                                        <div key={i} style={{marginBottom:'10px', color: c.user ? '#fff' : 'var(--active)', textAlign: c.user ? 'right' : 'left'}}>
                                            <b>{c.user ? "You: " : "AI: "}</b>{c.user || c.bot}
                                        </div>
                                    ))}
                                </div>
                                <input placeholder="Ask about app features..." value={aiInput} onChange={e=>setAiInput(e.target.value)} />
                                <button className="btn-neon" onClick={handleAiChat}>SEND TO AI</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close</p>
                            </div>
                        </div>
                    )}

                    {/* 📬 MAILBOX MODAL */}
                    {modal === "mailbox" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">📬 SUPPORT MAILBOX</h3>
                                <div style={{maxHeight:'40vh', overflowY:'auto', textAlign:'left', marginBottom:'15px', paddingRight:'5px'}}>
                                    {mails.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No messages yet. Ask admin for help!</p> : 
                                        mails.map((m,i)=>(
                                            <div key={i} style={{background: m.from === 'admin' ? '#0a2a0a' : '#0a0a0a', padding:'10px', margin:'10px 0', borderRadius:'8px', borderLeft:`3px solid ${m.from === 'admin' ? '#00ff00' : 'var(--active)'}`}}>
                                                <div style={{fontSize:'12px', color: m.from === 'admin' ? '#00ff00' : 'var(--active)', fontWeight:'bold', marginBottom:'5px'}}>{m.from === 'admin' ? '👑 ADMIN' : '👤 YOU'}</div>
                                                <div style={{fontSize:'14px', color:'#fff'}}>{m.msg}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <input placeholder="Type your problem here..." value={mailInput} onChange={e=>setMailInput(e.target.value)} />
                                <button className="btn-neon" onClick={()=>{
                                    if(!mailInput) return showAlert("Please write a message!");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/send-mail', {panel, email:user.email, message:mailInput})
                                    .then(()=>{
                                        showAlert("Message Sent to Admin successfully!"); 
                                        setMails([...mails, {from: 'user', msg: mailInput}]);
                                        setMailInput(""); 
                                    })
                                }}>SEND MESSAGE</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'string' && modal.includes("claim") && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">CLAIM YOUR GIFT</h3>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0 0 20px 0'}}>Submit your links for 1k Followers & 100k Views!</p>
                                <input placeholder="Paste Link For Followers" onChange={e=>setForm({...form, f_link:e.target.value})} />
                                <input placeholder="Paste Link For Views" onChange={e=>setForm({...form, v_link:e.target.value})} />
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.f_link || !form.v_link) return showAlert("Please provide both links!");
                                    axios.post('https://malik-proxy-smm.onrender.com/api/claim-reward', {panel, email:user.email, views_link:form.v_link, followers_link:form.f_link})
                                    .then(()=>{showAlert("Reward Claimed! Admin will process it soon.");setModal(null);})
                                }}>SUBMIT LINKS</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "pay" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">ADD FUNDS</h3>
                                <div style={{background:'#fff', padding:'10px', borderRadius:'15px', display:'inline-block', margin:'15px 0'}}>
                                    <img src={panel === 1 ? appConfig.qr_1 : appConfig.qr_2} style={{width:'220px', display:'block'}} onError={(e)=>e.target.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=followersincrease870@oksbi"} />
                                </div>
                                <p style={{color:'#aaa', fontSize:'13px', margin:'0'}}>Scan QR or Pay via UPI</p>
                                <div className="text-glow" style={{fontWeight:'bold', marginBottom:'10px', fontSize:'15px'}}>followersincrease870@oksbi</div>
                                <p style={{color:'#ff003c', fontSize:'11px', fontWeight:'bold', marginBottom:'15px'}}>For International / Other payment methods, please contact Admin via Support Mailbox.</p>
                                
                                <input placeholder="Amount Paid (INR)" type="number" onChange={e=>setForm({...form, amt:e.target.value})} />
                                <input placeholder="12-digit UTR or Transaction ID" onChange={e=>setForm({...form, utr:e.target.value})} />
                                <button className="btn-neon" onClick={()=>axios.post('https://malik-proxy-smm.onrender.com/api/add-funds', {panel, email:user.email, amount:form.amt, utr:form.utr}).then(()=>{showAlert("Payment Request Sent!");setModal(null);})}>SUBMIT REQUEST</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {modal === "guide" && (
                        <div className="modal">
                            <div className="modal-body" style={{textAlign:'left'}}>
                                <h2 className="text-glow" style={{textAlign:'center'}}>How to Use?</h2>
                                <p style={{color:'#bbb', lineHeight:'1.8', fontSize:'14px'}}>
                                    1. <b>Add Funds:</b> Click the Add Funds button, scan the QR code or use the UPI ID to pay.<br/>
                                    2. <b>Submit UTR:</b> Enter the amount and 12-digit UTR number correctly.<br/>
                                    3. <b>Wait:</b> Admin will approve it within 5-10 minutes.<br/>
                                    4. <b>Order:</b> Go to Services, select the cheapest service, paste your link, enter quantity, and click Place Order.<br/>
                                    5. <b>Done:</b> Your order will start instantly!
                                </p>
                                <button className="btn-neon" onClick={()=>setModal(null)} style={{marginTop:'15px'}}>UNDERSTOOD</button>
                            </div>
                        </div>
                    )}

                    {modal === "history" && (
                        <div className="modal">
                            <div className="modal-body">
                                <h3 className="text-glow">TRANSACTION HISTORY</h3>
                                <div style={{maxHeight:'50vh', overflowY:'auto', textAlign:'left'}}>
                                    {txns.length === 0 ? <p style={{textAlign:'center', color:'#666'}}>No Transactions Yet.</p> : 
                                        txns.map((t,i)=>(
                                            <div key={i} style={{background:'#0a0a0a', padding:'10px', margin:'10px 0', borderRadius:'8px', borderLeft:'3px solid var(--active)'}}>
                                                <div style={{display:'flex', justifyContent:'space-between'}}>
                                                    <b>{currency==='USD'?'$':'₹'}{(currency==='USD'?t.amount/83:t.amount).toFixed(2)}</b>
                                                    <span style={{color: t.status==='Approved'?'#0f0':'#f00'}}>{t.status}</span>
                                                </div>
                                                <div style={{fontSize:'10px', color:'#555', marginTop:'5px'}}>UTR/TXN: {t.utr}</div>
                                            </div>
                                        ))
                                    }
                                </div>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Close Window</p>
                            </div>
                        </div>
                    )}

                    {typeof modal === 'object' && modal !== null && (
                        <div className="modal">
                            <div className="modal-body">
                                <h4 className="text-glow" style={{marginBottom:'20px'}}>{modal.name}</h4>
                                <input placeholder="Paste Valid Link Here" onChange={e=>setForm({...form, link:e.target.value})} />
                                <input placeholder="Quantity (Min 10)" type="number" onChange={e=>setForm({...form, qty:e.target.value})} />
                                <h2 className="text-glow" style={{margin:'20px 0'}}>Total: {currency==='USD'?'$':'₹'}{((form.qty/1000)*getRate(modal.rate)).toFixed(3)}</h2>
                                <button className="btn-neon" onClick={()=>{
                                    if(!form.link || form.link.length < 4) { showAlert("Idhar valid link daalo! ⚠️"); return; }
                                    const c = (form.qty/1000)*(modal.rate * (1 - discount/100)); // Base charge recorded
                                    axios.post('https://malik-proxy-smm.onrender.com/api/place-order', {panel, email:user.email, username:user.username, service:modal.service, service_name:modal.name, link:form.link, qty:form.qty, charge:c})
                                    .then(r => {
                                        showAlert("Order Placed Successfully! 🚀"); 
                                        setModal(null);
                                    }).catch(e=>showAlert(e.response.data.error || "Order Failed!"));
                                }}>CONFIRM ORDER</button>
                                <p onClick={()=>setModal(null)} style={{marginTop:'20px', cursor:'pointer', color:'#777'}}>Cancel</p>
                            </div>
                        </div>
                    )}

                    <div className="bottom-nav">
                        <div className={`nav-btn ${tab==="Home"?"nav-active":""}`} onClick={()=>setTab("Home")}><i className="fa fa-home"></i>Home</div>
                        <div className={`nav-btn ${tab==="Services"?"nav-active":""}`} onClick={()=>setTab("Services")}><i className="fa fa-bolt"></i>Services</div>
                        <div className={`nav-btn ${tab==="Orders"?"nav-active":""}`} onClick={()=>setTab("Orders")}><i className="fa fa-box"></i>Orders</div>
                        <div className={`nav-btn ${tab==="Settings"?"nav-active":""}`} onClick={()=>setTab("Settings")}><i className="fa fa-cog"></i>Settings</div>
                        <div className={`nav-btn ${tab==="Profile"?"nav-active":""}`} onClick={()=>setTab("Profile")}><i className="fa fa-user-circle"></i>Profile</div>
                    </div>
                </div>
            );
        };
        ReactDOM.render(React.createElement(AppUI), document.getElementById('root'));
    </script>
</body>
</html>
